<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 370" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="sb-a" markerWidth="11" markerHeight="11" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6B7280"/></marker>
    <marker id="sb-o" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker>
    <marker id="sb-r" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#EF4444"/></marker>
  </defs>
  <rect width="720" height="370" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">建圖主迴圈:每幀 LiDAR(~10Hz)做三件事</text>

  <!-- 三步框 -->
  <rect x="32" y="50" width="206" height="78" rx="9" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="135" y="72" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">① odometry 預測</text>
  <text x="135" y="92" text-anchor="middle" font-size="10" fill="#374151">encoder:前進 0.31m、右轉 2°</text>
  <text x="135" y="110" text-anchor="middle" font-size="10" fill="#9A3412">→ 位姿初猜(有漂移)</text>

  <rect x="258" y="50" width="206" height="78" rx="9" fill="#FFF7ED" stroke="#F97316" stroke-width="1.6"/>
  <text x="361" y="72" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9A3412">② scan matching 修正</text>
  <text x="361" y="92" text-anchor="middle" font-size="10" fill="#374151">這幀 scan 跟已建地圖比對</text>
  <text x="361" y="110" text-anchor="middle" font-size="10" fill="#065F46">→ 修正後位姿</text>

  <rect x="484" y="50" width="204" height="78" rx="9" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="586" y="72" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065F46">③ 更新地圖</text>
  <text x="586" y="92" text-anchor="middle" font-size="10" fill="#374151">沿每條光束:穿過→free</text>
  <text x="586" y="110" text-anchor="middle" font-size="10" fill="#374151">端點那格→occupied</text>

  <g stroke="#6B7280" stroke-width="2" marker-end="url(#sb-a)">
    <line x1="238" y1="89" x2="256" y2="89"/><line x1="464" y1="89" x2="482" y2="89"/>
  </g>

  <!-- ② 示意 -->
  <rect x="32" y="158" width="320" height="150" rx="9" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.1"/>
  <text x="192" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412">② 對齊:把 scan 挪到對得上</text>
  <text x="120" y="210" font-size="10" fill="#6B7280">地圖既有的牆</text>
  <rect x="120" y="216" width="150" height="9" fill="#374151"/>
  <text x="120" y="246" font-size="10" fill="#6B7280">新 scan 的牆(差半格)</text>
  <rect x="132" y="252" width="150" height="9" fill="#F97316"/>
  <line x1="207" y1="276" x2="195" y2="276" stroke="#F97316" stroke-width="2" marker-end="url(#sb-o)"/>
  <text x="245" y="280" text-anchor="middle" font-size="10" fill="#9A3412">平移對齊</text>
  <text x="192" y="300" text-anchor="middle" font-size="10" fill="#374151">對齊的同時,位姿也被一起修正</text>

  <!-- ③ 示意 ray casting -->
  <rect x="368" y="158" width="320" height="150" rx="9" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.1"/>
  <text x="528" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">③ 刻畫:ray casting</text>
  <circle cx="404" cy="232" r="8" fill="#3B82F6"/>
  <line x1="414" y1="232" x2="628" y2="232" stroke="#10B981" stroke-width="2.2" marker-end="url(#sb-r)"/>
  <rect x="636" y="218" width="14" height="28" fill="#374151"/>
  <text x="520" y="220" text-anchor="middle" font-size="10" fill="#065F46">光束穿過的格 → 標 free</text>
  <text x="643" y="262" text-anchor="middle" font-size="10" fill="#374151">端點 → occupied</text>
  <text x="404" y="262" text-anchor="middle" font-size="9.5" fill="#6B7280">機器人</text>

  <text x="360" y="338" text-anchor="middle" font-size="11.5" fill="#374151">關鍵:scan matching 是「用地圖反過來修定位」——odometry 每步的小漂移持續被拉回</text>
  <text x="360" y="358" text-anchor="middle" font-size="10" fill="#6B7280">所以 odometry 標定品質決定 SLAM 上限:初猜偏太多,會對到錯的位置</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 260" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="ha" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#3B82F6"/></marker></defs>
  <rect width="660" height="260" fill="#ffffff"/>
  <text x="330" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">通訊看門狗:上位機當機,下位機自己會停</text>

  <!-- host commands (down arrows) -->
  <text x="40" y="52" font-size="11" fill="#1E40AF">上位機</text>
  <g stroke="#3B82F6" stroke-width="1.8" marker-end="url(#ha)">
    <line x1="90" y1="44" x2="90" y2="74"/><line x1="160" y1="44" x2="160" y2="74"/><line x1="230" y1="44" x2="230" y2="74"/><line x1="300" y1="44" x2="300" y2="74"/>
  </g>
  <text x="195" y="42" text-anchor="middle" font-size="10.5" fill="#1E40AF">週期送速度指令</text>
  <text x="430" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">✕ 上位機當機(指令斷掉)</text>

  <!-- threshold line -->
  <line x1="60" y1="120" x2="620" y2="120" stroke="#DC2626" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="610" y="114" text-anchor="end" font-size="10.5" fill="#991B1B">COMM_TIMEOUT(如 300ms)</text>

  <!-- timer baseline -->
  <line x1="60" y1="220" x2="630" y2="220" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="40" y="224" font-size="11" fill="#6B7280">計時器</text>
  <text x="635" y="224" font-size="11" fill="#6B7280" text-anchor="end">時間 →</text>

  <!-- sawtooth: rises, reset on each command -->
  <polyline points="90,220 160,184 160,220 230,184 230,220 300,184 300,220" fill="none" stroke="#10B981" stroke-width="2.2"/>
  <!-- after crash: keeps rising past threshold -->
  <polyline points="300,220 470,95 500,73" fill="none" stroke="#DC2626" stroke-width="2.4"/>
  <text x="195" y="172" font-size="10.5" fill="#065F46">每收到指令就歸零</text>
  <text x="150" y="244" font-size="9.5" fill="#6B7280">心跳也算餵狗:閒置時靠心跳維持歸零</text>

  <!-- trigger -->
  <circle cx="436" cy="120" r="7" fill="none" stroke="#F97316" stroke-width="2.2"/>
  <line x1="436" y1="120" x2="436" y2="240" stroke="#F97316" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="436" y="254" text-anchor="middle" font-size="11" font-weight="700" fill="#9A3412">越過門檻 → 觸發 ramp-down 平滑停車</text>
</svg>

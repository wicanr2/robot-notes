<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">Park 變換:跳上旋轉木馬,交流就變直流</text>

  <!-- LEFT: platform view (stator) -->
  <text x="170" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">月台視角(定子,不動的觀察者)</text>
  <line x1="50" y1="180" x2="300" y2="180" stroke="#9CA3AF" stroke-width="1.2"/>
  <path d="M60.0,180.0 L71.0,159.1 L82.0,142.8 L93.0,134.6 L100.3,134.6 L111.3,142.8 L122.3,159.1 L133.3,180.0 L144.3,200.9 L155.3,217.2 L166.3,225.4 L173.7,225.4 L184.7,217.2 L195.7,200.9 L206.7,180.0 L217.7,159.1 L228.7,142.8 L239.7,134.6 L247.0,134.6 L258.0,142.8 L269.0,159.1 L280.0,180.0" fill="none" stroke="#DC2626" stroke-width="2.6"/>
  <text x="175" y="252" text-anchor="middle" font-size="11.5" fill="#991B1B">量到的電流:交流弦波,一直振盪</text>
  <text x="175" y="272" text-anchor="middle" font-size="11" fill="#6B7280">PI 控制器很難追「一直在動」的目標</text>

  <line x1="320" y1="44" x2="320" y2="288" stroke="#E5E7EB"/>

  <!-- RIGHT: carousel view (rotor) -->
  <text x="475" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">轉盤視角(跳上轉子一起轉)</text>
  <line x1="350" y1="180" x2="600" y2="180" stroke="#9CA3AF" stroke-width="1.2"/>
  <!-- constant lines iq, id -->
  <line x1="360" y1="138" x2="590" y2="138" stroke="#059669" stroke-width="2.6"/>
  <text x="596" y="142" font-size="11" font-weight="700" fill="#065F46">iq</text>
  <line x1="360" y1="172" x2="590" y2="172" stroke="#2563EB" stroke-width="2.6" stroke-dasharray="5 3"/>
  <text x="596" y="176" font-size="11" font-weight="700" fill="#1E40AF">id=0</text>
  <text x="475" y="252" text-anchor="middle" font-size="11.5" fill="#065F46">磁場相對你靜止 → 電流變兩個「直流」</text>
  <text x="475" y="272" text-anchor="middle" font-size="11" fill="#6B7280">iq(出扭矩)、id(設 0)都是定值 → 好控制</text>

  <!-- carousel icon hint -->
  <g transform="translate(475,150)">
    <circle r="22" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="0" cy="-22" r="3" fill="#059669"/>
    <text x="0" y="4" text-anchor="middle" font-size="9" fill="#065F46">轉</text>
  </g>
</svg>

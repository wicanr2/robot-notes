<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 270" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="sa" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker></defs>
  <rect width="620" height="270" fill="#ffffff"/>
  <text x="310" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">scan matching 其實是在「最小化殘差平方和」</text>
  <text x="310" y="46" text-anchor="middle" font-size="12" fill="#6B7280">「找最契合位置」= 找 (Δx, Δy, Δθ) 讓每個 scan 點到最近牆的距離平方和最小</text>

  <!-- LEFT: misaligned -->
  <text x="155" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">位姿偏了:殘差大</text>
  <line x1="120" y1="90" x2="120" y2="210" stroke="#6B7280" stroke-width="5"/>
  <text x="100" y="230" text-anchor="middle" font-size="11" fill="#6B7280">地圖的牆</text>
  <g fill="#DC2626">
    <circle cx="180" cy="100" r="3.5"/><circle cx="186" cy="125" r="3.5"/><circle cx="178" cy="150" r="3.5"/><circle cx="190" cy="175" r="3.5"/><circle cx="182" cy="200" r="3.5"/>
  </g>
  <g stroke="#DC2626" stroke-width="1.4" stroke-dasharray="4 2">
    <line x1="120" y1="100" x2="180" y2="100"/><line x1="120" y1="125" x2="186" y2="125"/><line x1="120" y1="150" x2="178" y2="150"/><line x1="120" y1="175" x2="190" y2="175"/><line x1="120" y1="200" x2="182" y2="200"/>
  </g>
  <text x="200" y="150" font-size="11" fill="#991B1B">scan 點</text>
  <text x="155" y="250" text-anchor="middle" font-size="12" fill="#991B1B">Σ 殘差² 很大</text>

  <!-- arrow: search -->
  <line x1="270" y1="150" x2="345" y2="150" stroke="#F97316" stroke-width="2.4" marker-end="url(#sa)"/>
  <text x="307" y="140" text-anchor="middle" font-size="11.5" fill="#9A3412">挪 (Δx,Δy,Δθ)</text>
  <text x="307" y="166" text-anchor="middle" font-size="11" fill="#6B7280">找最小</text>

  <!-- RIGHT: aligned -->
  <text x="475" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">對齊後:殘差≈0</text>
  <line x1="450" y1="90" x2="450" y2="210" stroke="#6B7280" stroke-width="5"/>
  <g stroke="#059669" stroke-width="1.4" stroke-dasharray="3 2">
    <line x1="450" y1="100" x2="455" y2="100"/><line x1="450" y1="125" x2="456" y2="125"/><line x1="450" y1="150" x2="454" y2="150"/><line x1="450" y1="175" x2="456" y2="175"/><line x1="450" y1="200" x2="455" y2="200"/>
  </g>
  <g fill="#059669">
    <circle cx="455" cy="100" r="3.5"/><circle cx="456" cy="125" r="3.5"/><circle cx="454" cy="150" r="3.5"/><circle cx="456" cy="175" r="3.5"/><circle cx="455" cy="200" r="3.5"/>
  </g>
  <text x="475" y="250" text-anchor="middle" font-size="12" fill="#065F46">Σ 殘差² 最小 → 勝出</text>
</svg>

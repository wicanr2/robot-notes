<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 290" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="gd" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3B82F6"/></marker>
    <marker id="gu" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker>
  </defs>
  <rect width="660" height="290" fill="#ffffff"/>
  <text x="330" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">Gazebo ↔ Nav2 閉迴路:模擬出感測、Nav2 下指令</text>

  <!-- Gazebo -->
  <rect x="60" y="46" width="540" height="58" rx="9" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.6"/>
  <text x="330" y="68" text-anchor="middle" font-size="13.5" font-weight="700" fill="#991B1B">Gazebo (gz sim)</text>
  <text x="330" y="88" text-anchor="middle" font-size="11" fill="#6B7280">物理 + 餐廳世界 + 差速 AMR + 感測器外掛</text>

  <!-- bridge -->
  <rect x="60" y="130" width="540" height="30" rx="6" fill="#F3F4F6" stroke="#9CA3AF"/>
  <text x="330" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">ros_gz_bridge(雙向翻譯 gz topic ↔ ROS topic)</text>

  <!-- ROS / Nav2 -->
  <rect x="60" y="186" width="540" height="64" rx="9" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="330" y="208" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E40AF">ROS 2:slam_toolbox + Nav2</text>
  <text x="330" y="228" text-anchor="middle" font-size="11" fill="#6B7280">slam_toolbox:/scan + odom→base_link → /map + map→odom</text>
  <text x="330" y="244" text-anchor="middle" font-size="11" fill="#6B7280">Nav2:訂 /scan /odom /tf → 規劃 → 發 /cmd_vel</text>

  <!-- down arrow: sensors gz->ROS -->
  <line x1="180" y1="104" x2="180" y2="184" stroke="#3B82F6" stroke-width="2.2" marker-end="url(#gd)"/>
  <text x="180" y="123" text-anchor="middle" font-size="10" fill="#1E40AF">/scan /odom /tf</text>
  <text x="180" y="176" text-anchor="middle" font-size="9" fill="#6B7280">(感測 → 導航)</text>

  <!-- up arrow: cmd_vel ROS->gz -->
  <line x1="480" y1="184" x2="480" y2="104" stroke="#F97316" stroke-width="2.2" marker-end="url(#gu)"/>
  <text x="480" y="123" text-anchor="middle" font-size="10" fill="#9A3412">/cmd_vel</text>
  <text x="480" y="176" text-anchor="middle" font-size="9" fill="#9A3412">(速度指令 → 車)</text>

  <text x="330" y="278" text-anchor="middle" font-size="10.5" fill="#6B7280">tf 樹三方各補一段(gz 發 odom→base_link、slam 發 map→odom、URDF 發 base_link→sensor);所有節點 use_sim_time</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="of" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#374151"/></marker>
    <marker id="ofm" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker>
  </defs>
  <rect width="700" height="480" fill="#ffffff"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">OpenRMF ↔ VDA5050 串接:從下任務到車執行的資料流</text>

  <!-- lane headers -->
  <g>
    <rect x="40" y="44" width="110" height="40" rx="7" fill="#F5F3FF" stroke="#8B5CF6"/><text x="95" y="62" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5B21B6">上層系統</text><text x="95" y="77" text-anchor="middle" font-size="9.5" fill="#6B7280">Dashboard</text>
    <rect x="200" y="44" width="140" height="40" rx="7" fill="#EFF6FF" stroke="#3B82F6"/><text x="270" y="62" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">RMF Dispatcher</text><text x="270" y="77" text-anchor="middle" font-size="9.5" fill="#6B7280">rmf_task_ros2</text>
    <rect x="380" y="44" width="140" height="40" rx="7" fill="#ECFDF5" stroke="#10B981"/><text x="450" y="62" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065F46">Fleet Adapter</text><text x="450" y="77" text-anchor="middle" font-size="9.5" fill="#6B7280">你寫的這層</text>
    <rect x="560" y="44" width="110" height="40" rx="7" fill="#FEF2F2" stroke="#EF4444"/><text x="615" y="62" text-anchor="middle" font-size="11.5" font-weight="700" fill="#991B1B">VDA5050 車</text><text x="615" y="77" text-anchor="middle" font-size="9.5" fill="#6B7280">over MQTT</text>
  </g>
  <!-- lifelines -->
  <g stroke="#D1D5DB" stroke-width="1" stroke-dasharray="3 4">
    <line x1="95" y1="88" x2="95" y2="450"/><line x1="270" y1="88" x2="270" y2="450"/><line x1="450" y1="88" x2="450" y2="450"/><line x1="615" y1="88" x2="615" y2="450"/>
  </g>

  <!-- steps -->
  <g font-size="10.5" fill="#1F2937">
    <line x1="95" y1="110" x2="268" y2="110" stroke="#374151" stroke-width="1.4" marker-end="url(#of)"/><text x="182" y="104" text-anchor="middle">下任務 SubmitTask</text>

    <line x1="270" y1="146" x2="448" y2="146" stroke="#374151" stroke-width="1.4" marker-end="url(#of)"/><text x="360" y="140" text-anchor="middle">① BidNotice(廣播給所有車隊)</text>

    <line x1="450" y1="182" x2="272" y2="182" stroke="#374151" stroke-width="1.4" marker-end="url(#of)"/><text x="360" y="176" text-anchor="middle">② BidProposal(TaskPlanner 算成本)</text>

    <line x1="270" y1="218" x2="448" y2="218" stroke="#374151" stroke-width="1.4" marker-end="url(#of)"/><text x="360" y="212" text-anchor="middle">③ DispatchRequest(比價 → 指定得標)</text>

    <!-- adapter self: plan -->
    <rect x="372" y="236" width="156" height="26" rx="5" fill="#ECFDF5" stroke="#10B981"/><text x="450" y="253" text-anchor="middle" font-size="10" fill="#065F46">RMF 用 nav graph 規劃整段路線</text>

    <line x1="450" y1="288" x2="613" y2="288" stroke="#F97316" stroke-width="1.6" marker-end="url(#ofm)"/><text x="535" y="282" text-anchor="middle" fill="#9A3412">④ 翻成 VDA5050 order</text><text x="535" y="304" text-anchor="middle" font-size="9" fill="#9A3412">(node/edge JSON)</text>

    <line x1="615" y1="332" x2="452" y2="332" stroke="#F97316" stroke-width="1.6" marker-end="url(#ofm)"/><text x="535" y="326" text-anchor="middle" fill="#9A3412">⑤ VDA5050 state</text><text x="535" y="348" text-anchor="middle" font-size="9" fill="#9A3412">(位置/電量/模式)</text>

    <rect x="360" y="366" width="180" height="40" rx="5" fill="#ECFDF5" stroke="#10B981"/><text x="450" y="383" text-anchor="middle" font-size="10" fill="#065F46">⑥ RobotUpdateHandle.update</text><text x="450" y="398" text-anchor="middle" font-size="9.5" fill="#065F46">→ 進 rmf_traffic 協商</text>

    <line x1="450" y1="430" x2="613" y2="430" stroke="#F97316" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ofm)"/><text x="530" y="424" text-anchor="middle" fill="#9A3412">⑦ 衝突→replan→追加 order(released 逐段放行)</text>
  </g>

  <text x="350" y="466" text-anchor="middle" font-size="10" fill="#6B7280">④⑤⑦(橘色)走 VDA5050/MQTT;①②③⑥ 是 RMF 內部(ROS 2)。註:RMF 當 VDA5050 master 的官方 adapter 仍非現成,多經中介(InOrbit/vda5050_connector)</text>
</svg>

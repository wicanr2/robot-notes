<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="640" height="250" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">VDA5050 的 released / horizon:主控逐段放行的掛鉤</text>
  <text x="320" y="46" text-anchor="middle" font-size="12" fill="#6B7280">一筆 order = 一串 node(節點)+ edge(邊);主控決定走哪、車自己負責怎麼開</text>

  <!-- base edges (released) -->
  <line x1="60" y1="120" x2="300" y2="120" stroke="#10B981" stroke-width="4"/>
  <!-- horizon edges (not released) -->
  <line x1="300" y1="120" x2="560" y2="120" stroke="#9CA3AF" stroke-width="2.5" stroke-dasharray="7 5"/>

  <!-- nodes -->
  <g>
    <circle cx="60" cy="120" r="9" fill="#10B981"/><circle cx="140" cy="120" r="9" fill="#10B981"/><circle cx="220" cy="120" r="9" fill="#10B981"/><circle cx="300" cy="120" r="9" fill="#10B981"/>
    <circle cx="380" cy="120" r="9" fill="#fff" stroke="#9CA3AF" stroke-width="2"/><circle cx="460" cy="120" r="9" fill="#fff" stroke="#9CA3AF" stroke-width="2"/><circle cx="540" cy="120" r="9" fill="#fff" stroke="#9CA3AF" stroke-width="2"/>
  </g>
  <!-- robot at start -->
  <text x="60" y="100" text-anchor="middle" font-size="16">🤖</text>

  <!-- release boundary -->
  <line x1="340" y1="78" x2="340" y2="150" stroke="#F97316" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="340" y="72" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9A3412">釋放線(主控逐步往前推)</text>

  <!-- brackets -->
  <text x="180" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">base(released = true)</text>
  <text x="180" y="180" text-anchor="middle" font-size="11.5" fill="#065F46">車被授權實際行駛的路段</text>
  <text x="450" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#6B7280">horizon(未釋放)</text>
  <text x="450" y="180" text-anchor="middle" font-size="11.5" fill="#6B7280">已規劃、但尚未授權(只給車預知前方)</text>

  <rect x="80" y="200" width="480" height="34" rx="6" fill="#FFF7ED" stroke="#F97316"/>
  <text x="320" y="222" text-anchor="middle" font-size="12" fill="#9A3412">主控可在最後一刻才把 horizon 釋放成 base(等前車先過、等門開)→ 這正是跨車交通協調掛進來的點</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="di-b" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#3B82F6"/></marker>
    <marker id="di-g" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#10B981"/></marker>
    <marker id="di-r" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#EF4444"/></marker>
    <marker id="di-o" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#F97316"/></marker>
  </defs>
  <rect width="720" height="480" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">DDS 底層(RTPS)兩大機制:① 發現　② 可靠傳輸</text>

  <!-- ① Discovery -->
  <text x="40" y="58" font-size="12.5" font-weight="700" fill="#1E40AF">① 發現(discovery)</text>
  <rect x="50" y="68" width="130" height="46" rx="8" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="115" y="96" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">Participant A</text>
  <rect x="540" y="68" width="130" height="46" rx="8" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="605" y="96" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">Participant B</text>
  <ellipse cx="360" cy="91" rx="100" ry="30" fill="#F3F4F6" stroke="#9CA3AF"/>
  <text x="360" y="86" text-anchor="middle" font-size="10" fill="#374151">多播 239.255.0.1</text>
  <text x="360" y="100" text-anchor="middle" font-size="9" fill="#6B7280">:7400+(由 domain 決定)</text>
  <line x1="182" y1="86" x2="258" y2="89" stroke="#3B82F6" stroke-width="1.6" marker-end="url(#di-b)"/>
  <line x1="538" y1="86" x2="462" y2="89" stroke="#3B82F6" stroke-width="1.6" marker-end="url(#di-b)"/>
  <text x="220" y="78" font-size="9" fill="#1E40AF">announce</text>
  <text x="500" y="78" font-size="9" fill="#1E40AF">announce</text>
  <text x="360" y="138" text-anchor="middle" font-size="10.5" fill="#374151">上線就往多播喊「我是誰、有哪些 reader/writer、QoS」→ 同 domain 且 QoS 相容才 match,之後資料才流</text>

  <line x1="40" y1="156" x2="680" y2="156" stroke="#E5E7EB" stroke-width="1.4"/>

  <!-- ② Reliable -->
  <text x="40" y="180" font-size="12.5" font-weight="700" fill="#065F46">② 可靠傳輸(reliable):heartbeat + ACKNACK 補丟包</text>
  <rect x="60" y="194" width="120" height="40" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="120" y="219" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">Writer</text>
  <rect x="540" y="194" width="120" height="40" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="600" y="219" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">Reader</text>
  <line x1="120" y1="234" x2="120" y2="450" stroke="#D1D5DB" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="600" y1="234" x2="600" y2="450" stroke="#D1D5DB" stroke-width="1.2" stroke-dasharray="3,3"/>

  <line x1="120" y1="256" x2="600" y2="256" stroke="#10B981" stroke-width="1.8" marker-end="url(#di-g)"/>
  <text x="360" y="250" text-anchor="middle" font-size="10" fill="#065F46">data #1</text>
  <line x1="120" y1="284" x2="430" y2="284" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#di-r)"/>
  <text x="300" y="278" text-anchor="middle" font-size="10" fill="#B91C1C">data #2 … 丟包 ✗</text>
  <line x1="120" y1="312" x2="600" y2="312" stroke="#10B981" stroke-width="1.8" marker-end="url(#di-g)"/>
  <text x="360" y="306" text-anchor="middle" font-size="10" fill="#065F46">data #3</text>
  <line x1="120" y1="344" x2="600" y2="344" stroke="#3B82F6" stroke-width="1.8" marker-end="url(#di-b)"/>
  <text x="360" y="338" text-anchor="middle" font-size="10" fill="#1E40AF">heartbeat:我已發到 #3</text>
  <line x1="600" y1="376" x2="120" y2="376" stroke="#F97316" stroke-width="1.8" marker-end="url(#di-o)"/>
  <text x="360" y="370" text-anchor="middle" font-size="10" fill="#9A3412">ACKNACK:我缺 #2</text>
  <line x1="120" y1="408" x2="600" y2="408" stroke="#F97316" stroke-width="1.8" marker-end="url(#di-o)"/>
  <text x="360" y="402" text-anchor="middle" font-size="10" fill="#9A3412">重傳 #2(Writer 留著 history 才能補)</text>

  <text x="360" y="444" text-anchor="middle" font-size="10.5" fill="#6B7280">best-effort 相反:直接發、丟了算了,不留 history、不重傳(高頻感測資料用這個)</text>
  <text x="360" y="464" text-anchor="middle" font-size="9.5" fill="#9CA3AF">⚠ 這是理解用的概念圖;RTPS / QoS / 分片細節極多,生產一律用現成 DDS(Fast DDS / Cyclone)</text>
</svg>

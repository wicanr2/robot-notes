<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 350" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="740" height="350" fill="#ffffff"/>
  <text x="370" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">反電動勢(back-EMF):馬達轉起來,自己也像發電機產生反向電壓</text>
  <text x="370" y="46" text-anchor="middle" font-size="11" fill="#6B7280">反電動勢 ∝ 轉速(E = kₑ·ω):轉越快它越大、轉速歸零它就歸零——這條線同時解釋了短路煞車與堵轉</text>

  <!-- 座標軸 -->
  <line x1="80" y1="280" x2="360" y2="280" stroke="#374151" stroke-width="1.6"/>
  <line x1="80" y1="280" x2="80" y2="90" stroke="#374151" stroke-width="1.6"/>
  <text x="365" y="296" font-size="10" fill="#374151">轉速 ω →</text>
  <text x="62" y="86" font-size="10" fill="#374151" text-anchor="middle">E</text>
  <text x="50" y="200" font-size="9" fill="#6B7280" text-anchor="middle" transform="rotate(-90 50 200)">反電動勢</text>
  <!-- 正比直線 -->
  <line x1="80" y1="280" x2="340" y2="110" stroke="#2563EB" stroke-width="2.6"/>
  <text x="270" y="150" font-size="10.5" font-weight="700" fill="#1E40AF">E = kₑ·ω</text>
  <!-- 原點(堵轉) -->
  <circle cx="80" cy="280" r="5" fill="#DC2626"/>
  <text x="92" y="296" font-size="9" fill="#991B1B">ω=0(堵轉)→ E=0</text>
  <!-- 高轉速點 -->
  <circle cx="330" cy="116" r="5" fill="#059669"/>
  <text x="250" y="104" font-size="9" fill="#065F46">高轉速 → E 大</text>

  <!-- 右:兩個用途 -->
  <rect x="400" y="86" width="320" height="92" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="416" y="110" font-size="11.5" font-weight="700" fill="#065F46">① 高轉速:E 大 → 可拿來煞車(§25.3)</text>
  <text x="416" y="132" font-size="10" fill="#374151">把三相繞組短路,旋轉產生的 E 會驅動電流</text>
  <text x="416" y="149" font-size="10" fill="#374151">經繞組電阻耗散 → 變成阻礙轉動的煞車力矩</text>
  <text x="416" y="168" font-size="9" fill="#6B7280">(轉得越快、煞車力矩越大;停下來就沒煞車力了)</text>

  <rect x="400" y="190" width="320" height="100" rx="8" fill="#FEF2F2" stroke="#EF4444"/>
  <text x="416" y="214" font-size="11.5" font-weight="700" fill="#991B1B">② 堵轉:ω=0 → E=0 → 電流飆升(§26.3)</text>
  <text x="416" y="236" font-size="10" fill="#374151">轉子被卡住,轉速=0、反電動勢=0,</text>
  <text x="416" y="253" font-size="10" fill="#374151">沒有反電壓擋電流 → 電流 = V/R 衝到最大,</text>
  <text x="416" y="270" font-size="10" fill="#374151">機械輸出功=扭矩×轉速=0 → 能量幾乎全變熱</text>
  <text x="416" y="285" font-size="9" fill="#6B7280">這就是「大電流 + 近零轉速」會一起出現的原因</text>

  <text x="370" y="318" text-anchor="middle" font-size="10" fill="#6B7280">同一條 E∝ω 直線,兩端各是一個現象:右端(高速)能煞車,左端(零速)會燒</text>
</svg>

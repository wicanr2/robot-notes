<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="780" height="300" fill="#ffffff"/>
  <text x="390" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">協方差矩陣 Σ = 一個橢球</text>
  <text x="390" y="52" text-anchor="middle" font-size="12.5" fill="#6B7280">多維高斯的「不確定性形狀」,正是 3D Gaussian Splatting 拿來當積木的東西</text>

  <!-- panel 1: circle -->
  <g>
    <line x1="70" y1="200" x2="230" y2="200" stroke="#E5E7EB"/><line x1="150" y1="110" x2="150" y2="250" stroke="#E5E7EB"/>
    <ellipse cx="150" cy="180" rx="55" ry="55" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <circle cx="150" cy="180" r="3" fill="#2563EB"/>
    <text x="150" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">圓</text>
    <text x="150" y="296" text-anchor="middle" font-size="11.5" fill="#6B7280">各方向一樣不確定</text>
  </g>

  <!-- panel 2: axis-aligned ellipse -->
  <g>
    <line x1="310" y1="200" x2="470" y2="200" stroke="#E5E7EB"/><line x1="390" y1="110" x2="390" y2="250" stroke="#E5E7EB"/>
    <ellipse cx="390" cy="180" rx="72" ry="40" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
    <circle cx="390" cy="180" r="3" fill="#7C3AED"/>
    <text x="390" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">軸對齊橢圓</text>
    <text x="390" y="296" text-anchor="middle" font-size="11.5" fill="#6B7280">x 方向比 y 方向確定</text>
  </g>

  <!-- panel 3: tilted ellipse -->
  <g>
    <line x1="550" y1="200" x2="710" y2="200" stroke="#E5E7EB"/><line x1="630" y1="110" x2="630" y2="250" stroke="#E5E7EB"/>
    <ellipse cx="630" cy="180" rx="72" ry="34" fill="#FFEDD5" stroke="#EA580C" stroke-width="2" transform="rotate(-32 630 180)"/>
    <circle cx="630" cy="180" r="3" fill="#EA580C"/>
    <text x="630" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#9A3412">斜橢圓</text>
    <text x="630" y="296" text-anchor="middle" font-size="11.5" fill="#6B7280">x, y 相關(沿某方向不確定大)</text>
  </g>
</svg>

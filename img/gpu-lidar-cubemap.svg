<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#374151"/></marker>
  </defs>
  <rect width="820" height="400" fill="#ffffff"/>
  <text x="410" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">為什麼用 cubemap:一台相機看不滿 360°,就用立方體的面拼起來</text>
  <text x="410" y="46" text-anchor="middle" font-size="11" fill="#6B7280">LiDAR 擺在立方體中心,每個面是一台朝外、90° 視野的「深度相機」;水平一圈 = 4 個側面 × 90° = 360°</text>

  <!-- 左:俯視 4 側面拼 360° -->
  <text x="40" y="78" font-size="12" font-weight="700" fill="#374151">① 俯視:4 個側面各管 90°,拼成水平 360°</text>
  <!-- 立方體側面(俯視=正方形) -->
  <rect x="95" y="110" width="210" height="210" fill="none" stroke="#9CA3AF" stroke-width="2"/>
  <!-- 4 個 90° 扇形(用三角形近似填色),中心 (200,215) -->
  <g opacity="0.5">
    <polygon points="200,215 95,110 305,110" fill="#FDBA74"/>
    <polygon points="200,215 305,110 305,320" fill="#93C5FD"/>
    <polygon points="200,215 305,320 95,320" fill="#86EFAC"/>
    <polygon points="200,215 95,320 95,110" fill="#C4B5FD"/>
  </g>
  <line x1="95" y1="110" x2="305" y2="320" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="305" y1="110" x2="95" y2="320" stroke="#ffffff" stroke-width="1.5"/>
  <!-- LiDAR 中心 -->
  <circle cx="200" cy="215" r="6" fill="#1F2937"/>
  <text x="200" y="235" text-anchor="middle" font-size="9" fill="#374151">LiDAR</text>
  <!-- 面標籤 -->
  <text x="200" y="103" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9A3412">+Y 面 90°</text>
  <text x="318" y="218" font-size="9.5" font-weight="700" fill="#1E40AF">+X 面 90°</text>
  <text x="200" y="337" text-anchor="middle" font-size="9.5" font-weight="700" fill="#065F46">−Y 面 90°</text>
  <text x="30" y="218" font-size="9.5" font-weight="700" fill="#5B21B6">−X 面 90°</text>
  <text x="200" y="360" text-anchor="middle" font-size="9" fill="#6B7280">(上下還有 +Z/−Z 兩面,管垂直視野)</text>

  <!-- 右:一條 ray → 哪一面 + UV -->
  <text x="430" y="78" font-size="12" font-weight="700" fill="#374151">② 每條 ray:先決定落在哪一面,再取那面的 (u,v) 像素</text>
  <!-- 一個面的深度圖(grid) -->
  <rect x="470" y="110" width="180" height="180" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <g stroke="#BFDBFE" stroke-width="1">
    <line x1="470" y1="155" x2="650" y2="155"/><line x1="470" y1="200" x2="650" y2="200"/><line x1="470" y1="245" x2="650" y2="245"/>
    <line x1="515" y1="110" x2="515" y2="290"/><line x1="560" y1="110" x2="560" y2="290"/><line x1="605" y1="110" x2="605" y2="290"/>
  </g>
  <text x="560" y="103" text-anchor="middle" font-size="9.5" fill="#1E40AF">+X 面的深度圖(一張 texture)</text>
  <!-- 取樣點 -->
  <circle cx="582" cy="178" r="5" fill="#DC2626"/>
  <text x="592" y="176" font-size="9" fill="#991B1B">(u, v)</text>
  <text x="560" y="312" text-anchor="middle" font-size="9" fill="#374151">該 texel 的值 = 這條 ray 到最近表面的距離</text>
  <!-- ray 來源:從中心 LiDAR 射出 -->
  <circle cx="408" cy="245" r="5" fill="#1F2937"/>
  <text x="408" y="265" text-anchor="middle" font-size="8.5" fill="#374151">中心 LiDAR</text>
  <line x1="413" y1="242" x2="578" y2="182" stroke="#374151" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#c)"/>
  <text x="430" y="220" font-size="8.5" fill="#6B7280">一條輸出 ray:方位角先挑面…</text>
  <text x="430" y="350" font-size="9" fill="#6B7280">UV = 貼圖上的 2D 座標(像圖片的 x,y);texel = 貼圖上的一個像素</text>

  <line x1="385" y1="92" x2="385" y2="360" stroke="#E5E7EB" stroke-width="1"/>
</svg>

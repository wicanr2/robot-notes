<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 250" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="cl" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker></defs>
  <rect width="660" height="250" fill="#ffffff"/>
  <text x="330" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">用 Claude 做模擬:先建「快速確定的回饋迴路」</text>

  <!-- 4 nodes in a loop -->
  <rect x="40" y="70" width="150" height="64" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.6"/>
  <text x="115" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">改設定 / 程式</text>
  <text x="115" y="116" text-anchor="middle" font-size="10.5" fill="#6B7280">URDF / reward / config</text>

  <rect x="255" y="70" width="150" height="64" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="330" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">headless 跑模擬</text>
  <text x="330" y="116" text-anchor="middle" font-size="10.5" fill="#6B7280">固定 N 步 / M 回合、固定種子</text>

  <rect x="470" y="70" width="150" height="64" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="1.6"/>
  <text x="545" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">輸出一個數字</text>
  <text x="545" y="110" text-anchor="middle" font-size="10" fill="#6B7280">success rate / reward</text>
  <text x="545" y="124" text-anchor="middle" font-size="10" fill="#6B7280">碰撞次數 / 到點誤差</text>

  <!-- forward arrows -->
  <line x1="190" y1="102" x2="253" y2="102" stroke="#F97316" stroke-width="2.2" marker-end="url(#cl)"/>
  <line x1="405" y1="102" x2="468" y2="102" stroke="#F97316" stroke-width="2.2" marker-end="url(#cl)"/>

  <!-- Claude reads & decides (bottom), loops back -->
  <rect x="200" y="170" width="260" height="50" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.8"/>
  <text x="330" y="190" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">Claude 讀數字,決定下一步改什麼</text>
  <text x="330" y="208" text-anchor="middle" font-size="10.5" fill="#6B7280">「success 高但急停多 → 加大 jerk 懲罰」</text>

  <path d="M545,134 C545,195 462,195 462,195" fill="none" stroke="#F97316" stroke-width="2.2" marker-end="url(#cl)"/>
  <path d="M198,195 C115,195 115,136 115,136" fill="none" stroke="#F97316" stroke-width="2.2" marker-end="url(#cl)"/>

  <text x="330" y="244" text-anchor="middle" font-size="11" fill="#9A3412">沒有這個數字,agent 只能瞎猜;2 秒確定的迴路 &gt; 30 秒不穩的迴路</text>
</svg>

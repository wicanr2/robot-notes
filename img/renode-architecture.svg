<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 330" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="na" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker></defs>
  <rect width="640" height="330" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">Renode「全系統」模擬:連周邊、感測器、多板一起</text>

  <!-- elf input -->
  <rect x="230" y="42" width="180" height="34" rx="6" fill="#FFF7ED" stroke="#F97316" stroke-width="1.6"/>
  <text x="320" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9A3412">同一份 .elf / .bin</text>
  <text x="320" y="71" text-anchor="middle" font-size="10" fill="#9A3412">和燒進真板的完全相同(不用改 code)</text>
  <line x1="320" y1="76" x2="320" y2="92" stroke="#F97316" stroke-width="2" marker-end="url(#na)"/>

  <!-- Renode big box -->
  <rect x="30" y="96" width="580" height="222" rx="10" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.5"/>
  <text x="46" y="116" font-size="12.5" font-weight="700" fill="#374151">Renode 全系統模擬</text>

  <!-- Board 1 -->
  <rect x="46" y="126" width="280" height="178" rx="8" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="186" y="145" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">虛擬板 1(STM32 下位機)</text>
  <!-- core (own row) -->
  <rect x="60" y="152" width="252" height="24" rx="5" fill="#fff" stroke="#3B82F6"/><text x="186" y="168" text-anchor="middle" font-size="11" fill="#1E40AF">Cortex-M 核心</text>
  <!-- peripherals group -->
  <text x="62" y="192" font-size="10.5" font-weight="700" fill="#6B7280">周邊(韌體真正在乎的):</text>
  <g font-size="10" fill="#374151">
    <rect x="60" y="198" width="58" height="20" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="89" y="212" text-anchor="middle">UART</text>
    <rect x="124" y="198" width="58" height="20" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="153" y="212" text-anchor="middle">GPIO</text>
    <rect x="188" y="198" width="58" height="20" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="217" y="212" text-anchor="middle">I2C/SPI</text>
    <rect x="252" y="198" width="60" height="20" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="282" y="212" text-anchor="middle">CAN</text>
    <rect x="60" y="222" width="58" height="20" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="89" y="236" text-anchor="middle">Timer</text>
    <rect x="124" y="222" width="58" height="20" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="153" y="236" text-anchor="middle">ADC</text>
    <rect x="188" y="222" width="58" height="20" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="217" y="236" text-anchor="middle">DMA</text>
    <rect x="252" y="222" width="60" height="20" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="282" y="236" text-anchor="middle">看門狗</text>
  </g>
  <!-- virtual sensors -->
  <rect x="60" y="250" width="252" height="46" rx="6" fill="#F0FDF4" stroke="#16A34A"/>
  <text x="186" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">虛擬感測器 / 訊號注入(Python hook)</text>
  <text x="186" y="285" text-anchor="middle" font-size="10" fill="#166534">模擬 encoder 脈衝、IMU 資料 → 韌體以為接了真感測器</text>

  <!-- Board 2 -->
  <rect x="360" y="126" width="234" height="170" rx="8" fill="#F1F5F9" stroke="#64748B"/>
  <text x="477" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">虛擬板 2 / 上位機樁</text>
  <rect x="392" y="162" width="170" height="26" rx="5" fill="#fff" stroke="#64748B"/><text x="477" y="179" text-anchor="middle" font-size="10.5" fill="#334155">另一顆 MCU 或上位機模型</text>
  <text x="477" y="214" text-anchor="middle" font-size="10.5" fill="#6B7280">測上下位機協議(UART/CAN)</text>
  <text x="477" y="250" text-anchor="middle" font-size="10.5" fill="#6B7280">多板可同時跑、互相對話</text>
  <text x="477" y="276" text-anchor="middle" font-size="10.5" fill="#6B7280">不必接兩塊實體板</text>

  <!-- CAN link between boards -->
  <line x1="312" y1="165" x2="360" y2="165" stroke="#10B981" stroke-width="3.5"/>
  <text x="336" y="157" text-anchor="middle" font-size="10.5" font-weight="700" fill="#065F46">互連</text>
</svg>

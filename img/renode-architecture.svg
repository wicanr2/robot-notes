<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 330" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="na" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker></defs>
  <rect width="640" height="330" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">Renode「全系統」模擬:連周邊、感測器、多板一起</text>

  <!-- elf input -->
  <rect x="230" y="42" width="180" height="34" rx="6" fill="#FFF7ED" stroke="#F97316" stroke-width="1.6"/>
  <text x="320" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9A3412">同一份 .elf / .bin</text>
  <text x="320" y="71" text-anchor="middle" font-size="10" fill="#9A3412">和燒進真板的完全相同(不用改 code)</text>
  <line x1="320" y1="76" x2="320" y2="92" stroke="#F97316" stroke-width="2" marker-end="url(#na)"/>

  <!-- Renode big box -->
  <rect x="30" y="96" width="580" height="222" rx="10" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.5"/>
  <text x="46" y="116" font-size="12.5" font-weight="700" fill="#374151">Renode 全系統模擬</text>

  <!-- Board 1 -->
  <rect x="46" y="126" width="280" height="178" rx="8" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="186" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">虛擬板 1(STM32 下位機)</text>
  <rect x="62" y="156" width="100" height="28" rx="5" fill="#fff" stroke="#3B82F6"/><text x="112" y="174" text-anchor="middle" font-size="11" fill="#1E40AF">Cortex-M 核心</text>
  <!-- peripherals tags -->
  <g font-size="10" fill="#374151">
    <rect x="174" y="156" width="46" height="22" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="197" y="171" text-anchor="middle">UART</text>
    <rect x="226" y="156" width="42" height="22" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="247" y="171" text-anchor="middle">CAN</text>
    <rect x="274" y="156" width="44" height="22" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="296" y="171" text-anchor="middle">Timer</text>
    <rect x="62" y="190" width="46" height="22" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="85" y="205" text-anchor="middle">GPIO</text>
    <rect x="114" y="190" width="42" height="22" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="135" y="205" text-anchor="middle">I2C</text>
    <rect x="162" y="190" width="42" height="22" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="183" y="205" text-anchor="middle">SPI</text>
    <rect x="210" y="190" width="44" height="22" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="232" y="205" text-anchor="middle">ADC</text>
    <rect x="260" y="190" width="46" height="22" rx="4" fill="#fff" stroke="#9CA3AF"/><text x="283" y="205" text-anchor="middle">DMA</text>
  </g>
  <!-- virtual sensors -->
  <rect x="62" y="224" width="256" height="64" rx="6" fill="#F0FDF4" stroke="#16A34A"/>
  <text x="190" y="242" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">虛擬感測器 / 訊號注入</text>
  <text x="190" y="260" text-anchor="middle" font-size="10.5" fill="#166534">模擬 encoder 脈衝、IMU 資料(Python hook)</text>
  <text x="190" y="277" text-anchor="middle" font-size="10.5" fill="#166534">韌體以為自己接了真感測器</text>

  <!-- Board 2 -->
  <rect x="360" y="126" width="234" height="178" rx="8" fill="#FEF2F2" stroke="#EF4444"/>
  <text x="477" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991B1B">虛擬板 2 / 上位機樁</text>
  <rect x="376" y="160" width="100" height="26" rx="5" fill="#fff" stroke="#EF4444"/><text x="426" y="177" text-anchor="middle" font-size="10.5" fill="#991B1B">另一顆 MCU</text>
  <text x="477" y="206" text-anchor="middle" font-size="10.5" fill="#6B7280">或模擬上位機,測上下位機協議</text>
  <text x="477" y="270" text-anchor="middle" font-size="10.5" fill="#6B7280">多板可同時跑、互相對話</text>

  <!-- CAN link between boards -->
  <line x1="326" y1="167" x2="360" y2="167" stroke="#10B981" stroke-width="3"/>
  <text x="343" y="160" text-anchor="middle" font-size="9.5" fill="#065F46">CAN/UART 互連</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="mt" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#F97316"/></marker></defs>
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">低速為什麼用 T 法測速:數脈衝會數不準,量間隔時間才準</text>

  <!-- LEFT: M method -->
  <text x="160" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">M 法:固定時間窗,數脈衝</text>
  <!-- gate window -->
  <rect x="50" y="78" width="220" height="70" fill="#FEF2F2" stroke="#EF4444" stroke-dasharray="5 3"/>
  <text x="160" y="96" text-anchor="middle" font-size="10.5" fill="#991B1B">固定時間窗(如 10ms)</text>
  <!-- sparse pulses at low speed -->
  <polyline points="60,140 90,140 90,112 110,112 110,140 175,140 175,112 195,112 195,140 270,140" fill="none" stroke="#1F2937" stroke-width="2"/>
  <text x="160" y="166" text-anchor="middle" font-size="11.5" fill="#991B1B">低速 → 窗內只數到 1~2 格</text>
  <text x="160" y="184" text-anchor="middle" font-size="11" fill="#6B7280">少一格就差很多 → 量化誤差大</text>

  <line x1="320" y1="46" x2="320" y2="270" stroke="#E5E7EB"/>

  <!-- RIGHT: T method -->
  <text x="475" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">T 法:量「兩脈衝間隔」的時間</text>
  <polyline points="360,140 410,140 410,112 430,112 430,140 560,140 560,112 580,112 580,140 600,140" fill="none" stroke="#1F2937" stroke-width="2"/>
  <!-- measure interval -->
  <line x1="420" y1="160" x2="570" y2="160" stroke="#F97316" stroke-width="1.6" marker-start="url(#mt)" marker-end="url(#mt)"/>
  <text x="495" y="178" text-anchor="middle" font-size="11.5" fill="#9A3412">用高頻時脈量這段時間</text>
  <text x="475" y="200" text-anchor="middle" font-size="11.5" fill="#065F46">低速 → 間隔長 → 時間量得準</text>

  <!-- conclusion -->
  <rect x="90" y="232" width="460" height="46" rx="8" fill="#FFF7ED" stroke="#F97316"/>
  <text x="320" y="252" text-anchor="middle" font-size="12.5" fill="#9A3412">低速:脈衝少、但每段時間長 → 用 T 法(量時間)</text>
  <text x="320" y="270" text-anchor="middle" font-size="12.5" fill="#9A3412">高速:脈衝多、時間段短 → 改用 M 法(數脈衝)</text>
</svg>

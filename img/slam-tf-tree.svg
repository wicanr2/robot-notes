<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="tf" markerWidth="11" markerHeight="11" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#6B7280"/></marker>
  </defs>
  <rect width="760" height="320" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1F2937">SLAM 的 tf 樹:三方各補一段才接得起來</text>
  <text x="380" y="51" text-anchor="middle" font-size="11.5" fill="#6B7280">少任何一段,RViz 就報 tf 斷裂,slam_toolbox 不知道雷射打在地圖哪裡</text>

  <!-- frames(四個,垂直排) -->
  <g font-size="13" font-weight="700">
    <rect x="300" y="74" width="160" height="40" rx="8" fill="#EFF6FF" stroke="#2563EB"/><text x="380" y="99" text-anchor="middle" fill="#1E40AF">map</text>
    <rect x="300" y="146" width="160" height="40" rx="8" fill="#ECFDF5" stroke="#10B981"/><text x="380" y="171" text-anchor="middle" fill="#065F46">odom</text>
    <rect x="300" y="218" width="160" height="40" rx="8" fill="#FFF7ED" stroke="#F97316"/><text x="380" y="243" text-anchor="middle" fill="#9A3412">base_link</text>
    <rect x="300" y="284" width="160" height="34" rx="8" fill="#F5F3FF" stroke="#8B5CF6"/><text x="380" y="306" text-anchor="middle" fill="#5B21B6" font-size="12">lidar_link</text>
  </g>

  <!-- arrows + 提供者 -->
  <g stroke="#6B7280" stroke-width="2" marker-end="url(#tf)">
    <line x1="380" y1="114" x2="380" y2="144"/>
    <line x1="380" y1="186" x2="380" y2="216"/>
    <line x1="380" y1="258" x2="380" y2="282"/>
  </g>

  <!-- 左側:每段誰提供 -->
  <g font-size="11">
    <rect x="40" y="116" width="222" height="28" rx="6" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="52" y="134" fill="#1E40AF"><tspan font-weight="700">slam_toolbox</tspan> 補 map→odom(修漂移)</text>
    <line x1="262" y1="129" x2="298" y2="129" stroke="#93C5FD" stroke-dasharray="3,2"/>

    <rect x="40" y="188" width="222" height="28" rx="6" fill="#ECFDF5" stroke="#6EE7B7"/>
    <text x="52" y="206" fill="#065F46"><tspan font-weight="700">里程計</tspan>(gz OdometryPublisher)</text>
    <line x1="262" y1="201" x2="298" y2="201" stroke="#6EE7B7" stroke-dasharray="3,2"/>

    <rect x="40" y="256" width="222" height="28" rx="6" fill="#FFF7ED" stroke="#FDBA74"/>
    <text x="52" y="274" fill="#9A3412"><tspan font-weight="700">robot_state_publisher</tspan>(讀 URDF)</text>
    <line x1="262" y1="270" x2="298" y2="270" stroke="#FDBA74" stroke-dasharray="3,2"/>
  </g>

  <!-- 右側:每段語意 -->
  <g font-size="10.5" fill="#6B7280">
    <text x="478" y="125">全域地圖座標 ← 修正里程漂移</text>
    <text x="478" y="138">(離散跳變)</text>
    <text x="478" y="197">相對里程原點的位姿</text>
    <text x="478" y="210">(連續、會慢慢漂)</text>
    <text x="478" y="269">車身到雷射的固定幾何</text>
    <text x="478" y="282">(外參,不變)</text>
  </g>
</svg>

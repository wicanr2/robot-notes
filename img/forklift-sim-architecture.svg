<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="fa" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/></marker></defs>
  <rect width="680" height="380" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">叉車搬運 demo 技術堆疊:Gazebo + Nav2 + OpenRMF (+VDA5050)</text>

  <!-- RMF top -->
  <rect x="40" y="44" width="600" height="50" rx="9" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.6"/>
  <text x="340" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">OpenRMF:派工 + 交通協商(宣告 actions: pick/drop)</text>
  <text x="340" y="82" text-anchor="middle" font-size="10.5" fill="#6B7280">Delivery Task + Dispenser/Ingestor,或 PerformAction;nav graph 標取放點(traffic-editor)</text>

  <!-- optional VDA5050 -->
  <rect x="450" y="104" width="190" height="40" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-dasharray="5 3"/>
  <text x="545" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#9A3412">(選用)VDA5050 connector</text>
  <text x="545" y="137" text-anchor="middle" font-size="9.5" fill="#9A3412">pick/drop = action(HARD)over MQTT</text>

  <!-- fleet adapter -->
  <rect x="40" y="104" width="380" height="40" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.6"/>
  <text x="230" y="122" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065F46">Fleet Adapter(你寫的)</text>
  <text x="230" y="137" text-anchor="middle" font-size="10" fill="#6B7280">navigate / execute_action(pick,drop)/ 回報位置電量</text>

  <!-- nav layer -->
  <rect x="40" y="156" width="290" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="185" y="176" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">Nav2 導航 + 對位(docking)</text>
  <text x="185" y="192" text-anchor="middle" font-size="10" fill="#6B7280">slam_toolbox 建圖 · footprint 設長方形</text>

  <rect x="350" y="156" width="290" height="44" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="495" y="176" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">ros2_control:升降關節</text>
  <text x="495" y="192" text-anchor="middle" font-size="10" fill="#6B7280">JointTrajectoryController 控 prismatic 貨叉</text>

  <!-- bridge -->
  <rect x="40" y="212" width="600" height="34" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.4"/>
  <text x="340" y="234" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">ros_gz_bridge：/scan /imu /odom /tf /cmd_vel /joint_states ↔ gz topics</text>

  <!-- gazebo -->
  <rect x="40" y="258" width="600" height="96" rx="9" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.6"/>
  <text x="340" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">Gazebo (gz sim Harmonic) 物理模擬</text>
  <g font-size="10.5" fill="#374151">
    <rect x="56" y="288" width="180" height="56" rx="6" fill="#fff" stroke="#EF4444"/><text x="146" y="308" text-anchor="middle" font-weight="700" fill="#991B1B">叉車 model</text><text x="146" y="324" text-anchor="middle" font-size="9.5">DiffDrive 底盤 + prismatic 貨叉</text><text x="146" y="338" text-anchor="middle" font-size="9.5">+ LiDAR/IMU + DetachableJoint</text>
    <rect x="250" y="288" width="170" height="56" rx="6" fill="#fff" stroke="#EF4444"/><text x="335" y="308" text-anchor="middle" font-weight="700" fill="#991B1B">棧板 / 貨架</text><text x="335" y="324" text-anchor="middle" font-size="9.5">box SDF(EPAL 1.2×0.8)</text><text x="335" y="338" text-anchor="middle" font-size="9.5">貨架 static</text>
    <rect x="434" y="288" width="190" height="56" rx="6" fill="#fff" stroke="#EF4444"/><text x="529" y="308" text-anchor="middle" font-weight="700" fill="#991B1B">倉儲 world</text><text x="529" y="324" text-anchor="middle" font-size="9.5">AWS warehouse 改</text><text x="529" y="338" text-anchor="middle" font-size="9.5">取放點 = Dispenser/Ingestor</text>
  </g>

  <!-- arrows -->
  <g stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#fa)">
    <line x1="230" y1="144" x2="230" y2="154"/>
    <line x1="185" y1="200" x2="185" y2="210"/><line x1="495" y1="200" x2="495" y2="210"/>
    <line x1="340" y1="246" x2="340" y2="256"/>
  </g>
</svg>

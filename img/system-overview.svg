<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="sd" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker>
    <marker id="sg" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/></marker>
  </defs>
  <rect width="680" height="380" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1F2937">一台送餐機器人的全貌:三層 + 一條對話線</text>

  <!-- App layer -->
  <rect x="60" y="44" width="560" height="52" rx="9" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.6"/>
  <text x="340" y="66" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5B21B6">應用層(App)</text>
  <text x="340" y="86" text-anchor="middle" font-size="11" fill="#6B7280">點餐整合 · 桌位管理 · 任務調度 · UI / 語音</text>

  <line x1="340" y1="96" x2="340" y2="114" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#sg)"/>
  <text x="420" y="110" font-size="10" fill="#6B7280">REST / WebSocket</text>

  <!-- High-level -->
  <rect x="60" y="116" width="560" height="74" rx="9" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="340" y="138" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E40AF">上位機(High-level,跑 Linux 的小電腦)— 負責「想」</text>
  <text x="340" y="158" text-anchor="middle" font-size="11" fill="#1F2937">SLAM 建圖 · 定位(AMCL)· 路徑規劃(Nav2)· 避障 · 感測融合(EKF)</text>
  <text x="340" y="176" text-anchor="middle" font-size="10.5" fill="#6B7280">運算平台:Jetson / x86 NUC / RK3588　|　非硬即時</text>

  <!-- sensors feeding high-level -->
  <rect x="500" y="206" width="140" height="44" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="570" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">感測器</text>
  <text x="570" y="242" text-anchor="middle" font-size="9.5" fill="#6B7280">2D LiDAR / 深度相機 / IMU</text>
  <line x1="570" y1="206" x2="570" y2="190" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#sg)"/>

  <!-- UART/CAN link -->
  <rect x="250" y="206" width="180" height="44" rx="8" fill="#FFF7ED" stroke="#F97316"/>
  <text x="340" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412">UART / CAN 對話線</text>
  <text x="340" y="242" text-anchor="middle" font-size="9.5" fill="#9A3412">每幾十 ms 一來一回</text>
  <line x1="300" y1="206" x2="300" y2="190" stroke="#F97316" stroke-width="2.2" marker-end="url(#sd)"/>
  <text x="190" y="200" font-size="10" fill="#9A3412">↓ 速度指令 (v, ω)</text>
  <line x1="380" y1="256" x2="380" y2="272" stroke="#94A3B8" stroke-width="2.2" marker-end="url(#sg)"/>
  <text x="430" y="266" font-size="10" fill="#475569">↑ odometry / 狀態</text>

  <!-- Low-level -->
  <rect x="60" y="272" width="560" height="74" rx="9" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.6"/>
  <text x="340" y="294" text-anchor="middle" font-size="13.5" font-weight="700" fill="#991B1B">下位機(Low-level,STM32 專用晶片)— 負責「動」</text>
  <text x="340" y="314" text-anchor="middle" font-size="11" fill="#1F2937">馬達閉迴路 · odometry · IMU · 加減速 ramp · 急停 / 防撞</text>
  <text x="340" y="332" text-anchor="middle" font-size="10.5" fill="#991B1B">硬即時 · 安全相關功能放這層:上位機當機,它也能讓車安全停下</text>

  <line x1="300" y1="272" x2="300" y2="256" stroke="#F97316" stroke-width="2.2"/>
</svg>

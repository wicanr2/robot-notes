<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="mf-a" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6B7280"/></marker>
  </defs>
  <rect width="720" height="450" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">下位機韌體(STM32 + FreeRTOS):任務分層(按優先級)</text>

  <!-- 優先級軸 -->
  <line x1="40" y1="62" x2="40" y2="392" stroke="#6B7280" stroke-width="2" marker-end="url(#mf-a)"/>
  <text x="30" y="70" font-size="10" fill="#6B7280" transform="rotate(-90 30 70)" text-anchor="end">優先級 高 → 低</text>

  <!-- ① 安全監控(最高) -->
  <rect x="70" y="58" width="590" height="58" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="86" y="80" font-size="12.5" font-weight="700" fill="#991B1B">① 安全監控任務(最高優先級)</text>
  <text x="86" y="100" font-size="10" fill="#374151">急停 / 防撞條 / 通訊逾時 watchdog / 馬達過流 / 上位機心跳遺失 → 安全停車</text>
  <text x="648" y="80" text-anchor="end" font-size="9.5" fill="#991B1B">事件觸發</text>

  <!-- ② 運動控制 -->
  <rect x="70" y="124" width="590" height="58" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.6"/>
  <text x="86" y="146" font-size="12.5" font-weight="700" fill="#9A3412">② 運動控制任務</text>
  <text x="86" y="166" font-size="10" fill="#374151">(v, ω) → 差速運動學 → 左右輪目標轉速 → PID 速度環(或下發 FOC 驅動器)</text>
  <text x="648" y="146" text-anchor="end" font-size="9.5" fill="#9A3412">100 Hz–1 kHz</text>

  <!-- ③ 通訊 -->
  <rect x="70" y="190" width="590" height="50" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="86" y="211" font-size="12.5" font-weight="700" fill="#1E40AF">③ 通訊任務</text>
  <text x="86" y="229" font-size="10" fill="#374151">與上位機協議收發(UART / CAN);逾時即交給安全監控停車</text>
  <text x="648" y="211" text-anchor="end" font-size="9.5" fill="#1E40AF">50–100 Hz</text>

  <!-- ④ Odometry -->
  <rect x="70" y="248" width="590" height="50" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="86" y="269" font-size="12.5" font-weight="700" fill="#065F46">④ Odometry 任務</text>
  <text x="86" y="287" font-size="10" fill="#374151">encoder 積分 + IMU → (x, y, θ, v, ω) 上報給上位機</text>
  <text x="648" y="269" text-anchor="end" font-size="9.5" fill="#065F46">50–100 Hz</text>

  <!-- ⑤ 感測 -->
  <rect x="70" y="306" width="590" height="50" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="86" y="327" font-size="12.5" font-weight="700" fill="#374151">⑤ 感測任務</text>
  <text x="86" y="345" font-size="10" fill="#6B7280">IMU、超音波、電池 BMS、托盤感測</text>
  <text x="648" y="327" text-anchor="end" font-size="9.5" fill="#6B7280">較低頻</text>

  <text x="360" y="384" text-anchor="middle" font-size="11.5" fill="#374151">RTOS 用優先級隔離:安全監控最高,即使上位機當機也能讓車安全停下</text>
  <text x="360" y="406" text-anchor="middle" font-size="10" fill="#6B7280">通訊逾時保護:超過 200–500 ms 沒收到速度指令 → 自動減速停車(保命機制)</text>
  <text x="360" y="424" text-anchor="middle" font-size="10" fill="#6B7280">加減速限制 (ramp):速度指令在下位機平滑,加速度壓在 0.3–0.5 m/s² 以下,避免餐點打翻</text>
</svg>

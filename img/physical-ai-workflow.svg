<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 200" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="pw" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker></defs>
  <rect width="990" height="200" fill="#ffffff"/>
  <text x="495" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1F2937">Physical AI 工作流:建資料 → 訓練 → 部署(sim-to-real)</text>

  <!-- phase bands -->
  <text x="175" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#8B5CF6">① 建資料</text>
  <text x="575" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#10B981">② 訓練 / 驗證</text>
  <text x="895" y="52" text-anchor="middle" font-size="12" font-weight="700" fill="#EF4444">③ 部署</text>

  <g font-size="11">
    <rect x="20" y="62" width="150" height="98" rx="9" fill="#F5F3FF" stroke="#8B5CF6"/><text x="95" y="86" text-anchor="middle" font-weight="700" fill="#5B21B6">建場景</text><text x="95" y="108" text-anchor="middle" font-size="11" fill="#1F2937">Omniverse</text><text x="95" y="126" text-anchor="middle" font-size="9.5" fill="#6B7280">數位分身·OpenUSD</text>
    <rect x="180" y="62" width="150" height="98" rx="9" fill="#F5F3FF" stroke="#8B5CF6"/><text x="255" y="86" text-anchor="middle" font-weight="700" fill="#5B21B6">合成資料</text><text x="255" y="108" text-anchor="middle" font-size="11" fill="#1F2937">Replicator</text><text x="255" y="126" text-anchor="middle" font-size="9.5" fill="#6B7280">domain randomization</text>
    <rect x="340" y="62" width="150" height="98" rx="9" fill="#F5F3FF" stroke="#8B5CF6"/><text x="415" y="86" text-anchor="middle" font-weight="700" fill="#5B21B6">擴增 / 標註</text><text x="415" y="108" text-anchor="middle" font-size="11" fill="#1F2937">Cosmos(WFM)</text><text x="415" y="126" text-anchor="middle" font-size="9.5" fill="#6B7280">擴展情境</text>
    <rect x="500" y="62" width="150" height="98" rx="9" fill="#ECFDF5" stroke="#10B981"/><text x="575" y="86" text-anchor="middle" font-weight="700" fill="#065F46">訓練策略</text><text x="575" y="108" text-anchor="middle" font-size="11" fill="#1F2937">Isaac Lab</text><text x="575" y="126" text-anchor="middle" font-size="9.5" fill="#6B7280">RL / 模仿學習</text>
    <rect x="660" y="62" width="150" height="98" rx="9" fill="#ECFDF5" stroke="#10B981"/><text x="735" y="86" text-anchor="middle" font-weight="700" fill="#065F46">模擬驗證</text><text x="735" y="108" text-anchor="middle" font-size="11" fill="#1F2937">Isaac Sim</text><text x="735" y="126" text-anchor="middle" font-size="9.5" fill="#6B7280">SIL / HIL</text>
    <rect x="820" y="62" width="150" height="98" rx="9" fill="#FEF2F2" stroke="#EF4444"/><text x="895" y="86" text-anchor="middle" font-weight="700" fill="#991B1B">邊緣部署</text><text x="895" y="108" text-anchor="middle" font-size="11" fill="#1F2937">Jetson Thor</text><text x="895" y="126" text-anchor="middle" font-size="9.5" fill="#6B7280">→ 真實世界</text>
  </g>
  <g stroke="#F97316" stroke-width="2.2" marker-end="url(#pw)">
    <line x1="170" y1="111" x2="178" y2="111"/><line x1="330" y1="111" x2="338" y2="111"/><line x1="490" y1="111" x2="498" y2="111"/><line x1="650" y1="111" x2="658" y2="111"/><line x1="810" y1="111" x2="818" y2="111"/>
  </g>
  <text x="495" y="184" text-anchor="middle" font-size="10.5" fill="#6B7280">AMR 是官方點名的 embodiment 之一;Jetson Thor=通用機器人邊緣(送餐 AMR 用這顆),DRIVE AGX 是車規自駕、室內用不到</text>
</svg>

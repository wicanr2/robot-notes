<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 330" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="660" height="330" fill="#ffffff"/>
  <text x="330" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">VDA5050 order 的樹狀結構</text>

  <!-- order root -->
  <rect x="20" y="44" width="620" height="50" rx="9" fill="#FFF7ED" stroke="#F97316" stroke-width="1.6"/>
  <text x="36" y="64" font-size="13" font-weight="700" fill="#9A3412">order</text>
  <text x="36" y="84" font-size="10.5" fill="#6B7280">header: headerId · timestamp · version · manufacturer · serialNumber　│　orderId · orderUpdateId</text>

  <!-- nodes branch -->
  <rect x="40" y="116" width="290" height="120" rx="9" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="56" y="136" font-size="12.5" font-weight="700" fill="#1E40AF">nodes[](節點陣列)</text>
  <rect x="56" y="146" width="258" height="44" rx="6" fill="#fff" stroke="#3B82F6"/>
  <text x="68" y="163" font-size="10.5" fill="#1F2937">node:nodeId · sequenceId(偶 0,2,4)</text>
  <text x="68" y="180" font-size="10.5" fill="#1F2937">released(可走?)· nodePosition(x,y,θ,mapId)</text>
  <rect x="72" y="198" width="242" height="30" rx="6" fill="#ECFDF5" stroke="#10B981"/>
  <text x="84" y="217" font-size="10" fill="#065F46">actions[]:actionType · blockingType · params</text>

  <!-- edges branch -->
  <rect x="350" y="116" width="290" height="120" rx="9" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="366" y="136" font-size="12.5" font-weight="700" fill="#1E40AF">edges[](邊陣列)</text>
  <rect x="366" y="146" width="258" height="44" rx="6" fill="#fff" stroke="#3B82F6"/>
  <text x="378" y="163" font-size="10.5" fill="#1F2937">edge:edgeId · sequenceId(奇 1,3,5)</text>
  <text x="378" y="180" font-size="10.5" fill="#1F2937">released · startNodeId · endNodeId</text>
  <rect x="382" y="198" width="242" height="30" rx="6" fill="#ECFDF5" stroke="#10B981"/>
  <text x="394" y="217" font-size="10" fill="#065F46">actions[](同上,掛在邊上也行)</text>

  <!-- tree lines -->
  <line x1="185" y1="94" x2="185" y2="116" stroke="#9CA3AF" stroke-width="1.4"/>
  <line x1="495" y1="94" x2="495" y2="116" stroke="#9CA3AF" stroke-width="1.4"/>

  <text x="330" y="262" text-anchor="middle" font-size="11" fill="#374151">節點偶數、邊奇數交錯排序;released=true 是 base(可走)、false 是 horizon(已規劃未授權)</text>
  <text x="330" y="284" text-anchor="middle" font-size="11" fill="#6B7280">取放這類動作 = node 上的 action,actionType: pick/drop、blockingType: HARD(停車作業)</text>
  <text x="330" y="306" text-anchor="middle" font-size="10" fill="#9CA3AF">完整欄位以官方 order.schema 為準</text>
</svg>

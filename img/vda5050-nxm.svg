<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">為什麼需要 VDA5050:把 N×M 套對接收斂成 N+M</text>

  <!-- LEFT: no standard -->
  <text x="160" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">沒有標準:每對都要私有對接</text>
  <!-- masters -->
  <g>
    <rect x="40" y="74" width="64" height="30" rx="5" fill="#EFF6FF" stroke="#3B82F6"/><text x="72" y="94" text-anchor="middle" font-size="11" fill="#1E40AF">主控 1</text>
    <rect x="128" y="74" width="64" height="30" rx="5" fill="#EFF6FF" stroke="#3B82F6"/><text x="160" y="94" text-anchor="middle" font-size="11" fill="#1E40AF">主控 2</text>
    <rect x="216" y="74" width="64" height="30" rx="5" fill="#EFF6FF" stroke="#3B82F6"/><text x="248" y="94" text-anchor="middle" font-size="11" fill="#1E40AF">主控 3</text>
  </g>
  <!-- robots -->
  <g>
    <rect x="40" y="230" width="64" height="30" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="72" y="250" text-anchor="middle" font-size="11" fill="#991B1B">A 廠車</text>
    <rect x="128" y="230" width="64" height="30" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="160" y="250" text-anchor="middle" font-size="11" fill="#991B1B">B 廠車</text>
    <rect x="216" y="230" width="64" height="30" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="248" y="250" text-anchor="middle" font-size="11" fill="#991B1B">C 廠車</text>
  </g>
  <!-- 9 tangled lines -->
  <g stroke="#9CA3AF" stroke-width="1.1" opacity="0.8">
    <line x1="72" y1="104" x2="72" y2="230"/><line x1="72" y1="104" x2="160" y2="230"/><line x1="72" y1="104" x2="248" y2="230"/>
    <line x1="160" y1="104" x2="72" y2="230"/><line x1="160" y1="104" x2="160" y2="230"/><line x1="160" y1="104" x2="248" y2="230"/>
    <line x1="248" y1="104" x2="72" y2="230"/><line x1="248" y1="104" x2="160" y2="230"/><line x1="248" y1="104" x2="248" y2="230"/>
  </g>
  <text x="160" y="284" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991B1B">3 × 3 = 9 套私有對接</text>
  <text x="160" y="302" text-anchor="middle" font-size="11" fill="#6B7280">每加一家車/一套主控,工作量乘起來</text>

  <line x1="320" y1="50" x2="320" y2="300" stroke="#E5E7EB"/>

  <!-- RIGHT: with VDA5050 -->
  <text x="480" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">有 VDA5050:大家講同一種話</text>
  <g>
    <rect x="360" y="74" width="64" height="30" rx="5" fill="#EFF6FF" stroke="#3B82F6"/><text x="392" y="94" text-anchor="middle" font-size="11" fill="#1E40AF">主控 1</text>
    <rect x="448" y="74" width="64" height="30" rx="5" fill="#EFF6FF" stroke="#3B82F6"/><text x="480" y="94" text-anchor="middle" font-size="11" fill="#1E40AF">主控 2</text>
    <rect x="536" y="74" width="64" height="30" rx="5" fill="#EFF6FF" stroke="#3B82F6"/><text x="568" y="94" text-anchor="middle" font-size="11" fill="#1E40AF">主控 3</text>
  </g>
  <!-- standard bar -->
  <rect x="360" y="158" width="240" height="26" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.6"/>
  <text x="480" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">VDA5050 標準介面 (MQTT/JSON)</text>
  <g>
    <rect x="360" y="230" width="64" height="30" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="392" y="250" text-anchor="middle" font-size="11" fill="#991B1B">A 廠車</text>
    <rect x="448" y="230" width="64" height="30" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="480" y="250" text-anchor="middle" font-size="11" fill="#991B1B">B 廠車</text>
    <rect x="536" y="230" width="64" height="30" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="568" y="250" text-anchor="middle" font-size="11" fill="#991B1B">C 廠車</text>
  </g>
  <g stroke="#10B981" stroke-width="1.6">
    <line x1="392" y1="104" x2="392" y2="158"/><line x1="480" y1="104" x2="480" y2="158"/><line x1="568" y1="104" x2="568" y2="158"/>
    <line x1="392" y1="184" x2="392" y2="230"/><line x1="480" y1="184" x2="480" y2="230"/><line x1="568" y1="184" x2="568" y2="230"/>
  </g>
  <text x="480" y="284" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065F46">3 + 3 = 6 條接到標準</text>
  <text x="480" y="302" text-anchor="middle" font-size="11" fill="#6B7280">加一家只需多接一條,不乘起來</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 770 400" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <linearGradient id="slbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E3A8A"/><stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="770" height="400" fill="#ffffff"/>
  <text x="385" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1F2937">5G 網路切片:一張實體網,切成多條互不干擾的虛擬網</text>
  <text x="385" y="48" text-anchor="middle" font-size="11.5" fill="#6B7280">同一套基礎設施(基地台→邊緣→傳輸→核心),邏輯上切成多條各有品質保證的虛擬網路</text>

  <!-- 5G 標 -->
  <text x="78" y="92" text-anchor="middle" font-size="22" font-weight="800" fill="#10B981" font-style="italic">5G</text>

  <!-- 編排條 -->
  <rect x="150" y="66" width="550" height="40" rx="9" fill="url(#slbar)"/>
  <text x="425" y="91" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">網路切片編排(Network Slicing Orchestration)</text>
  <!-- 切片堆疊 icon(layers) -->
  <g transform="translate(720,74) scale(1.05)" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"/>
    <path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/>
    <path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/>
  </g>

  <!-- 編排連到各段(垂直虛線) -->
  <g stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="4,3">
    <line x1="200" y1="106" x2="200" y2="180"/>
    <line x1="360" y1="106" x2="360" y2="180"/>
    <line x1="510" y1="106" x2="510" y2="180"/>
    <line x1="660" y1="106" x2="660" y2="180"/>
  </g>

  <!-- 三條切片車道 -->
  <line x1="150" y1="182" x2="722" y2="182" stroke="#DC2626" stroke-width="2.6"/>
  <line x1="150" y1="212" x2="722" y2="212" stroke="#059669" stroke-width="2.6"/>
  <line x1="150" y1="242" x2="722" y2="242" stroke="#7C3AED" stroke-width="2.6"/>

  <!-- 車道左標籤 -->
  <circle cx="150" cy="182" r="3.6" fill="#DC2626"/>
  <text x="40" y="178" font-size="11.5" font-weight="700" fill="#B91C1C">URLLC</text>
  <text x="40" y="190" font-size="9" fill="#6B7280">即時控制</text>
  <circle cx="150" cy="212" r="3.6" fill="#059669"/>
  <text x="40" y="208" font-size="11.5" font-weight="700" fill="#047857">eMBB</text>
  <text x="40" y="220" font-size="9" fill="#6B7280">影像回傳</text>
  <circle cx="150" cy="242" r="3.6" fill="#7C3AED"/>
  <text x="40" y="238" font-size="11.5" font-weight="700" fill="#6D28D9">mMTC</text>
  <text x="40" y="250" font-size="9" fill="#6B7280">海量感測</text>

  <!-- 四段基礎設施(白底圈 + Lucide 圖示) -->
  <!-- 1 RAN -->
  <circle cx="200" cy="212" r="27" fill="#ffffff" stroke="#E5E7EB"/>
  <g transform="translate(180.4,191.6) scale(1.7)" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4.9 16.1C1 12.2 1 5.8 4.9 1.9"/><path d="M7.8 4.7a6.14 6.14 0 0 0-.8 7.5"/><circle cx="12" cy="9" r="2"/><path d="M16.2 4.8c2 2 2.26 5.11.8 7.47"/><path d="M19.1 1.9a9.96 9.96 0 0 1 0 14.1"/><path d="M9.5 18h5"/><path d="m8 22 4-11 4 11"/>
  </g>
  <text x="200" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">5G 基地台</text>
  <text x="200" y="309" text-anchor="middle" font-size="9.5" fill="#9CA3AF">RAN</text>

  <!-- 2 Edge (cpu) -->
  <circle cx="360" cy="212" r="27" fill="#ffffff" stroke="#E5E7EB"/>
  <g transform="translate(340.4,191.6) scale(1.7)" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="16" height="16" rx="2"/><rect x="8" y="8" width="8" height="8" rx="1"/>
    <path d="M12 2v2"/><path d="M12 20v2"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M7 2v2"/><path d="M17 2v2"/><path d="M7 20v2"/><path d="M17 20v2"/><path d="M2 7h2"/><path d="M2 17h2"/><path d="M20 7h2"/><path d="M20 17h2"/>
  </g>
  <text x="360" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">邊緣運算</text>
  <text x="360" y="309" text-anchor="middle" font-size="9.5" fill="#9CA3AF">Edge Compute</text>

  <!-- 3 Transport (share-2) -->
  <circle cx="510" cy="212" r="27" fill="#ffffff" stroke="#E5E7EB"/>
  <g transform="translate(490.4,191.6) scale(1.7)" fill="none" stroke="#334155" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
  </g>
  <text x="510" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">傳輸網路</text>
  <text x="510" y="309" text-anchor="middle" font-size="9.5" fill="#9CA3AF">前傳 / 中傳 / 後傳</text>

  <!-- 4 Core (server) -->
  <circle cx="660" cy="212" r="27" fill="#ffffff" stroke="#E5E7EB"/>
  <g transform="translate(640.4,194) scale(1.7)" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect width="20" height="8" x="2" y="2" rx="2"/><rect width="20" height="8" x="2" y="14" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/>
  </g>
  <text x="660" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">虛擬化核心網</text>
  <text x="660" y="309" text-anchor="middle" font-size="9.5" fill="#9CA3AF">Virtualized Core</text>

  <!-- 底部:機器人情境 -->
  <rect x="60" y="332" width="650" height="52" rx="9" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="74" y="353" font-size="11.5" fill="#374151"><tspan font-weight="700" fill="#1F2937">對機器人的意義:</tspan> 同一張廠區 5G,把「即時運動控制」放進 <tspan font-weight="700" fill="#B91C1C">URLLC</tspan> 切片(低延遲、保證頻寬),</text>
  <text x="74" y="372" font-size="11.5" fill="#374151">「攝影機影像回傳」放進 <tspan font-weight="700" fill="#047857">eMBB</tspan> 切片——就算影像把頻寬吃滿,也搶不到控制切片的資源,安全停車不會被拖慢。</text>
</svg>

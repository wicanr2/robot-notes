<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="820" height="360" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">LLM 推論流程:從文字到「下一個 token」,再接回去重跑</text>

  <!-- Step 1: text -->
  <rect x="30" y="70" width="120" height="70" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="90" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">① 輸入文字</text>
  <text x="90" y="122" text-anchor="middle" font-size="12.5" fill="#374151">「貓坐在」</text>

  <!-- arrow -->
  <line x1="150" y1="105" x2="188" y2="105" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="188,100 198,105 188,110" fill="#9CA3AF"/>

  <!-- Step 2: tokenize -->
  <rect x="200" y="70" width="130" height="70" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="265" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#15803D">② token 化</text>
  <text x="265" y="118" text-anchor="middle" font-size="11.5" fill="#374151">切詞元→編號</text>
  <text x="265" y="133" text-anchor="middle" font-size="11" fill="#6B7280">[貓][坐][在] → 71,9,3</text>

  <line x1="330" y1="105" x2="368" y2="105" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="368,100 378,105 368,110" fill="#9CA3AF"/>

  <!-- Step 3: embedding -->
  <rect x="380" y="70" width="130" height="70" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="445" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#15803D">③ embedding</text>
  <text x="445" y="118" text-anchor="middle" font-size="11.5" fill="#374151">編號→向量</text>
  <text x="445" y="133" text-anchor="middle" font-size="11" fill="#6B7280">語意座標</text>

  <line x1="510" y1="105" x2="548" y2="105" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="548,100 558,105 548,110" fill="#9CA3AF"/>

  <!-- Step 4: transformer -->
  <rect x="560" y="62" width="160" height="86" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.8"/>
  <text x="640" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">④ Transformer</text>
  <text x="640" y="110" text-anchor="middle" font-size="11.5" fill="#374151">自注意力:每個 token</text>
  <text x="640" y="126" text-anchor="middle" font-size="11.5" fill="#374151">按相關度參考其他 token</text>
  <text x="640" y="141" text-anchor="middle" font-size="10.5" fill="#9CA3AF">(平行運算)</text>

  <!-- down arrow to probs -->
  <line x1="640" y1="148" x2="640" y2="186" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="635,186 640,196 645,186" fill="#9CA3AF"/>

  <!-- Step 5: prob distribution -->
  <rect x="500" y="200" width="280" height="120" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="640" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">⑤ 輸出:詞表上每個 token 的機率</text>
  <!-- bars -->
  <rect x="525" y="270" width="34" height="34" fill="#2563EB"/>
  <text x="542" y="316" text-anchor="middle" font-size="11" fill="#374151">墊</text>
  <text x="542" y="262" text-anchor="middle" font-size="10" fill="#1E40AF">0.61</text>
  <rect x="585" y="284" width="34" height="20" fill="#60A5FA"/>
  <text x="602" y="316" text-anchor="middle" font-size="11" fill="#374151">地</text>
  <text x="602" y="276" text-anchor="middle" font-size="10" fill="#1E40AF">0.18</text>
  <rect x="645" y="292" width="34" height="12" fill="#93C5FD"/>
  <text x="662" y="316" text-anchor="middle" font-size="11" fill="#374151">桌</text>
  <text x="662" y="284" text-anchor="middle" font-size="10" fill="#1E40AF">0.09</text>
  <rect x="705" y="297" width="34" height="7" fill="#BFDBFE"/>
  <text x="722" y="316" text-anchor="middle" font-size="11" fill="#374151">…</text>

  <!-- pick token -->
  <line x1="500" y1="260" x2="420" y2="260" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="420,255 410,260 420,265" fill="#9CA3AF"/>
  <rect x="250" y="228" width="160" height="64" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="330" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">⑥ 取樣出下一個</text>
  <text x="330" y="274" text-anchor="middle" font-size="12.5" fill="#374151">→「墊」</text>

  <!-- feedback loop arrow back to input -->
  <path d="M250,260 L90,260 L90,148" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="85,158 90,148 95,158" fill="#DC2626"/>
  <text x="150" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">autoregressive:接回去當輸入,重跑</text>
  <text x="150" y="318" text-anchor="middle" font-size="10.5" fill="#9CA3AF">「貓坐在墊」→ 再猜下一個…</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">量化:用更少 bit 存權重,把同一個 70B 模型縮小</text>
  <text x="400" y="52" text-anchor="middle" font-size="12.5" fill="#6B7280">bit 數減半 → 佔用減半。FP4 才塞得進單機,還留空間給 KV cache</text>

  <!-- 128GB reference line -->
  <line x1="120" y1="90" x2="120" y2="290" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="160" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">GB10 128GB 上限 ↓</text>
  <!-- scale: 0GB at x=120, 1GB = 4px so 160GB = 640px -> ends at 760 -->

  <!-- FP16 -->
  <text x="105" y="118" text-anchor="end" font-size="13" font-weight="700" fill="#991B1B">FP16</text>
  <rect x="120" y="100" width="560" height="36" fill="#DC2626"/>
  <text x="690" y="123" font-size="12" font-weight="700" fill="#991B1B">~140 GB ✗ 超過</text>
  <text x="125" y="123" font-size="10.5" fill="#fff">2 bytes / 權重</text>

  <!-- FP8 -->
  <text x="105" y="178" text-anchor="end" font-size="13" font-weight="700" fill="#9A3412">FP8</text>
  <rect x="120" y="160" width="280" height="36" fill="#F97316"/>
  <text x="410" y="183" font-size="12" font-weight="700" fill="#9A3412">~70 GB ✓ 塞得下</text>
  <text x="125" y="183" font-size="10.5" fill="#fff">1 byte / 權重</text>

  <!-- FP4 -->
  <text x="105" y="238" text-anchor="end" font-size="13" font-weight="700" fill="#15803D">FP4</text>
  <rect x="120" y="220" width="140" height="36" fill="#22C55E"/>
  <text x="270" y="243" font-size="12" font-weight="700" fill="#15803D">~35 GB ✓✓ 寬裕</text>
  <text x="125" y="243" font-size="10.5" fill="#fff">0.5 byte</text>

  <!-- x axis ticks -->
  <line x1="120" y1="290" x2="760" y2="290" stroke="#D1D5DB" stroke-width="1"/>
  <text x="120" y="306" text-anchor="middle" font-size="10" fill="#9CA3AF">0</text>
  <text x="280" y="306" text-anchor="middle" font-size="10" fill="#9CA3AF">40GB</text>
  <text x="440" y="306" text-anchor="middle" font-size="10" fill="#9CA3AF">80GB</text>
  <text x="600" y="306" text-anchor="middle" font-size="10" fill="#9CA3AF">120GB</text>
  <text x="720" y="306" text-anchor="middle" font-size="10" fill="#9CA3AF">160GB</text>

  <!-- bonus note -->
  <rect x="120" y="330" width="640" height="46" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
  <text x="440" y="350" text-anchor="middle" font-size="12" font-weight="700" fill="#15803D">FP4 雙重好處:① 砍容量(塞得下更大模型)　② 每 token 搬的資料少 4× → 頻寬 bound 下更快</text>
  <text x="440" y="368" text-anchor="middle" font-size="10.5" fill="#6B7280">代價:bit 太少會掉準度;NVFP4 + 校準讓 4-bit 仍保住接近原本的準確度</text>
</svg>

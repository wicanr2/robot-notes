<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 350" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="af" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto"><path d="M0,0 L11,5 L0,10 Z" fill="#7C3AED"/></marker>
  </defs>
  <rect width="760" height="350" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">仿射變換後仍是高斯(P2):乘矩陣 + 平移,出來還是高斯</text>
  <text x="380" y="52" text-anchor="middle" font-size="12" fill="#6B7280">新的 (μ, Σ) 直接套公式算出來,不必重做積分——這是 EKF、3DGS 投影能算的根</text>

  <!-- 左:輸入高斯 -->
  <line x1="80" y1="240" x2="280" y2="240" stroke="#E5E7EB"/><line x1="180" y1="130" x2="180" y2="270" stroke="#E5E7EB"/>
  <ellipse cx="180" cy="200" rx="48" ry="48" fill="#DBEAFE" fill-opacity="0.6" stroke="#2563EB" stroke-width="2"/>
  <circle cx="180" cy="200" r="3.5" fill="#2563EB"/>
  <text x="180" y="294" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">x ~ N(μ, Σ)</text>
  <text x="180" y="312" text-anchor="middle" font-size="11" fill="#6B7280">原本的信念(一個橢球)</text>

  <!-- 中:變換箭頭 -->
  <line x1="300" y1="200" x2="430" y2="200" stroke="#7C3AED" stroke-width="2.4" marker-end="url(#af)"/>
  <text x="365" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">y = A x + b</text>
  <text x="365" y="222" text-anchor="middle" font-size="11" fill="#6B7280">A:旋轉 / 拉伸 / 投影</text>
  <text x="365" y="238" text-anchor="middle" font-size="11" fill="#6B7280">b:平移</text>

  <!-- 右:輸出高斯 -->
  <line x1="460" y1="240" x2="700" y2="240" stroke="#E5E7EB"/><line x1="575" y1="120" x2="575" y2="270" stroke="#E5E7EB"/>
  <ellipse cx="585" cy="180" rx="98" ry="44" fill="#EDE9FE" fill-opacity="0.6" stroke="#7C3AED" stroke-width="2" transform="rotate(-22 585 180)"/>
  <circle cx="585" cy="180" r="3.5" fill="#7C3AED"/>
  <text x="585" y="294" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">y ~ N(Aμ + b, A Σ Aᵀ)</text>
  <text x="585" y="312" text-anchor="middle" font-size="11" fill="#6B7280">被拉伸/旋轉/搬家,但還是橢球</text>

  <!-- 底部對照 -->
  <rect x="60" y="324" width="320" height="0" />
  <text x="120" y="338" font-size="11.5" fill="#374151"><tspan font-weight="700" fill="#1F2937">中心:</tspan> μ → Aμ + b</text>
  <text x="430" y="338" font-size="11.5" fill="#374151"><tspan font-weight="700" fill="#1F2937">形狀:</tspan> Σ → A Σ Aᵀ(協方差被 A 兩側夾)</text>
</svg>

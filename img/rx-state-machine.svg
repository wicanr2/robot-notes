<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="sm" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3B82F6"/></marker>
    <marker id="smr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#DC2626"/></marker>
  </defs>
  <rect width="640" height="290" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">接收狀態機:把黏在一起的位元組串流切回一幀一幀</text>

  <!-- states -->
  <g>
    <circle cx="100" cy="120" r="42" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="100" y="116" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">WAIT</text><text x="100" y="132" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">_SYNC1</text>
    <circle cx="250" cy="120" r="42" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="250" y="116" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">WAIT</text><text x="250" y="132" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">_SYNC2</text>
    <circle cx="400" cy="120" r="42" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="400" y="116" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">READ</text><text x="400" y="132" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">_HEADER</text>
    <circle cx="550" cy="120" r="42" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="550" y="116" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">READ</text><text x="550" y="132" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">_PAYLOAD</text>
  </g>

  <!-- forward transitions -->
  <g font-size="10.5" fill="#1E40AF">
    <line x1="142" y1="120" x2="206" y2="120" stroke="#3B82F6" stroke-width="1.8" marker-end="url(#sm)"/><text x="174" y="112" text-anchor="middle">收到 0xAA</text>
    <line x1="292" y1="120" x2="356" y2="120" stroke="#3B82F6" stroke-width="1.8" marker-end="url(#sm)"/><text x="324" y="112" text-anchor="middle">收到 0x55</text>
    <line x1="442" y1="120" x2="506" y2="120" stroke="#3B82F6" stroke-width="1.8" marker-end="url(#sm)"/><text x="474" y="112" text-anchor="middle">湊齊 header</text>
  </g>

  <!-- success: CRC ok -> emit, back to start -->
  <path d="M550,162 C550,225 100,225 100,164" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#sm)"/>
  <text x="325" y="242" text-anchor="middle" font-size="11" fill="#065F46">湊齊 N+2 bytes 且 CRC 正確 → 交出整幀,回到起點</text>

  <!-- failure edges back to WAIT_SYNC1 -->
  <path d="M250,78 C250,66 100,66 100,78" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#smr)"/>
  <path d="M400,78 C390,64 112,64 100,78" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#smr)"/>
  <path d="M550,78 C530,60 108,60 100,76" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#smr)"/>
  <text x="325" y="50" text-anchor="middle" font-size="10.5" fill="#991B1B">任一步不符 / CRC 錯 → 退回 WAIT_SYNC1(自我重新同步,假幀頭被 CRC 濾掉)</text>

  <text x="100" y="200" text-anchor="middle" font-size="10" fill="#6B7280">起點</text>
</svg>

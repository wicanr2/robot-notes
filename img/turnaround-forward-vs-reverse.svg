<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="fv-r" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#EF4444"/></marker>
    <marker id="fv-g" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#10B981"/></marker>
  </defs>
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">同一個後方目標:固定前進 vs 允許倒車</text>
  <line x1="360" y1="50" x2="360" y2="330" stroke="#E5E7EB" stroke-width="1.4"/>

  <!-- 左:固定前進 → 大迴轉 -->
  <text x="180" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="#B91C1C">繼承 vel = +0.5(只准前進)</text>
  <!-- 目標 -->
  <circle cx="96" cy="232" r="9" fill="#fff" stroke="#3B82F6" stroke-width="2.2"/>
  <text x="96" y="256" text-anchor="middle" font-size="10" fill="#1E40AF">路線起點</text>
  <!-- 車 -->
  <rect x="170" y="216" width="40" height="30" rx="4" fill="#FEF3C7" stroke="#D97706"/>
  <circle cx="206" cy="231" r="6" fill="#F97316"/>
  <text x="190" y="270" text-anchor="middle" font-size="9.5" fill="#6B7280">車頭朝右</text>
  <!-- 大迴轉弧:往右前出去繞一圈回到左方目標 -->
  <path d="M210,225 C300,120 250,90 180,100 C90,112 70,180 96,223" fill="none" stroke="#EF4444" stroke-width="2.6" stroke-dasharray="6,4" marker-end="url(#fv-r)"/>
  <text x="180" y="300" text-anchor="middle" font-size="11.5" fill="#B91C1C" font-weight="700">往前繞一大圈才回得來</text>
  <text x="180" y="318" text-anchor="middle" font-size="10" fill="#6B7280">大迴轉:慢、且可能離開受保護路網</text>

  <!-- 右:允許倒車 → 直達 -->
  <text x="540" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Reeds-Shepp 允許倒車(vel&lt;0)</text>
  <circle cx="456" cy="232" r="9" fill="#fff" stroke="#3B82F6" stroke-width="2.2"/>
  <text x="456" y="256" text-anchor="middle" font-size="10" fill="#1E40AF">路線起點</text>
  <rect x="530" y="216" width="40" height="30" rx="4" fill="#FEF3C7" stroke="#D97706"/>
  <circle cx="566" cy="231" r="6" fill="#F97316"/>
  <text x="550" y="270" text-anchor="middle" font-size="9.5" fill="#6B7280">車頭朝右</text>
  <!-- 倒車:直線往左退 -->
  <line x1="528" y1="231" x2="468" y2="231" stroke="#10B981" stroke-width="2.8" marker-end="url(#fv-g)"/>
  <text x="540" y="300" text-anchor="middle" font-size="11.5" fill="#065F46" font-weight="700">往牙叉端倒退約 1 公尺直達</text>
  <text x="540" y="318" text-anchor="middle" font-size="10" fill="#6B7280">最短、不繞、不離開路網</text>
  <text x="360" y="346" text-anchor="middle" font-size="9.5" fill="#9CA3AF">註:本例目標近共線,故倒車近直線;一般情形為「倒車 + 轉彎」的含曲率路徑</text>
</svg>

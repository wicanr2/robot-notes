<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">RGB-D 相機:一張量「顏色」,一張量「距離」</text>

  <!-- RGB panel -->
  <text x="165" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">RGB 圖(像素 = 顏色)</text>
  <g>
    <rect x="60" y="70" width="70" height="40" fill="#A16207"/><rect x="130" y="70" width="70" height="40" fill="#A16207"/><rect x="200" y="70" width="70" height="40" fill="#F3F4F6"/>
    <rect x="60" y="110" width="70" height="40" fill="#B45309"/><rect x="130" y="110" width="70" height="40" fill="#B45309"/><rect x="200" y="110" width="70" height="40" fill="#F3F4F6"/>
    <rect x="60" y="150" width="210" height="38" fill="#9CA3AF"/>
  </g>
  <text x="95" y="94" text-anchor="middle" font-size="9" fill="#fff">桌</text><text x="235" y="94" text-anchor="middle" font-size="9" fill="#6B7280">牆</text>
  <text x="165" y="206" text-anchor="middle" font-size="10.5" fill="#6B7280">人眼看內容:量「反射多少光」=外觀</text>

  <!-- Depth panel -->
  <text x="475" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">深度圖(像素 = 距離 mm)</text>
  <g font-size="11" fill="#fff" text-anchor="middle">
    <rect x="370" y="70" width="70" height="40" fill="#1F2937"/><text x="405" y="94">1200</text>
    <rect x="440" y="70" width="70" height="40" fill="#374151"/><text x="475" y="94">1210</text>
    <rect x="510" y="70" width="70" height="40" fill="#D1D5DB"/><text x="545" y="94" fill="#374151">3500</text>
    <rect x="370" y="110" width="70" height="40" fill="#1F2937"/><text x="405" y="134">1230</text>
    <rect x="440" y="110" width="70" height="40" fill="#374151"/><text x="475" y="134">1245</text>
    <rect x="510" y="110" width="70" height="40" fill="#D1D5DB"/><text x="545" y="134" fill="#374151">3500</text>
    <rect x="370" y="150" width="70" height="38" fill="#111827"/><text x="405" y="173">800</text>
    <rect x="440" y="150" width="70" height="38" fill="#6B7280"/><text x="475" y="173">1500</text>
    <rect x="510" y="150" width="70" height="38" fill="#9CA3AF"/><text x="545" y="173" fill="#374151">2900</text>
  </g>
  <text x="475" y="206" text-anchor="middle" font-size="10.5" fill="#6B7280">每格存「到相機距離」:近=亮、遠=暗=幾何</text>

  <rect x="120" y="232" width="400" height="46" rx="8" fill="#FFF7ED" stroke="#F97316"/>
  <text x="320" y="252" text-anchor="middle" font-size="12" fill="#9A3412">灰階照片量「反射多少光」(外觀);深度圖量「離我多遠」(幾何)</text>
  <text x="320" y="270" text-anchor="middle" font-size="10.5" fill="#6B7280">深度圖看起來像灰階,是檢視工具把距離「畫成」深淺而已</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="ac" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker></defs>
  <rect width="640" height="280" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">AMCL 三步循環:粒子雲從撒滿全場塌縮成一團</text>

  <!-- step 1 -->
  <rect x="30" y="90" width="180" height="96" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.6"/>
  <circle cx="56" cy="116" r="13" fill="#3B82F6"/><text x="56" y="121" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="125" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">預測(motion)</text>
  <text x="120" y="146" text-anchor="middle" font-size="11" fill="#1F2937">每個粒子按 odometry</text>
  <text x="120" y="164" text-anchor="middle" font-size="11" fill="#1F2937">移動 + 加隨機噪聲</text>

  <!-- step 2 -->
  <rect x="230" y="90" width="180" height="96" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.6"/>
  <circle cx="256" cy="116" r="13" fill="#10B981"/><text x="256" y="121" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="325" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">量測更新</text>
  <text x="320" y="146" text-anchor="middle" font-size="11" fill="#1F2937">比對 LiDAR:像→權重↑</text>
  <text x="320" y="164" text-anchor="middle" font-size="11" fill="#1F2937">不像→權重↓(似然 P(z|x))</text>

  <!-- step 3 -->
  <rect x="430" y="90" width="180" height="96" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="1.6"/>
  <circle cx="456" cy="116" r="13" fill="#F97316"/><text x="456" y="121" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="525" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">重採樣</text>
  <text x="520" y="146" text-anchor="middle" font-size="11" fill="#1F2937">高權重複製多份</text>
  <text x="520" y="164" text-anchor="middle" font-size="11" fill="#1F2937">低權重淘汰 → 雲收斂</text>

  <!-- arrows -->
  <line x1="210" y1="138" x2="228" y2="138" stroke="#F97316" stroke-width="2" marker-end="url(#ac)"/>
  <line x1="410" y1="138" x2="428" y2="138" stroke="#F97316" stroke-width="2" marker-end="url(#ac)"/>
  <!-- loop back -->
  <path d="M520,90 C520,52 120,52 120,88" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#ac)"/>
  <text x="320" y="48" text-anchor="middle" font-size="11" fill="#9A3412">不斷重複(每幀 scan)</text>

  <text x="320" y="224" text-anchor="middle" font-size="12" fill="#374151">t=0 撒滿全場 → 走幾步、持續比對 → 粒子雲聚成一團</text>
  <text x="320" y="246" text-anchor="middle" font-size="11" fill="#6B7280">加權平均 = 定位輸出;對稱走廊時會暫時保留多團(多峰)</text>
</svg>

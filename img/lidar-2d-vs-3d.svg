<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="760" height="330" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1F2937">2D vs 3D LiDAR:掃一個平面 vs 掃一片立體</text>

  <!-- 2D -->
  <g>
    <rect x="24" y="52" width="346" height="246" rx="9" fill="#EFF6FF" stroke="#3B82F6"/>
    <text x="197" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">2D:單線掃一個水平面</text>
    <!-- 機器人 -->
    <rect x="70" y="170" width="34" height="44" rx="6" fill="#CBD5E1" stroke="#64748B"/>
    <circle cx="87" cy="158" r="7" fill="#2563EB"/>
    <!-- 單一水平扇形 -->
    <path d="M87,158 L320,120 L320,196 Z" fill="#BFDBFE" fill-opacity="0.5" stroke="#3B82F6" stroke-width="1.3"/>
    <line x1="87" y1="158" x2="320" y2="158" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="250" y="150" font-size="9.5" fill="#1E40AF">一圈距離值</text>
    <!-- 盲區提示 -->
    <rect x="250" y="210" width="20" height="40" fill="#FCA5A5" fill-opacity="0.5" stroke="#EF4444" stroke-dasharray="3,2"/>
    <text x="260" y="266" text-anchor="middle" font-size="8.5" fill="#B91C1C">平面外</text>
    <text x="260" y="277" text-anchor="middle" font-size="8.5" fill="#B91C1C">盲區</text>
    <text x="197" y="293" text-anchor="middle" font-size="10" fill="#6B7280">數百點/圈 · 算力低 · 室內平地 AMR</text>
  </g>

  <!-- 3D -->
  <g>
    <rect x="390" y="52" width="346" height="246" rx="9" fill="#FFF7ED" stroke="#F97316"/>
    <text x="563" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">3D:多線掃成立體點雲</text>
    <rect x="436" y="170" width="34" height="44" rx="6" fill="#CBD5E1" stroke="#64748B"/>
    <circle cx="453" cy="158" r="7" fill="#EA580C"/>
    <!-- 多層扇形 -->
    <g stroke="#F97316" stroke-width="1.1" fill="none" opacity="0.8">
      <line x1="453" y1="158" x2="690" y2="108"/><line x1="453" y1="158" x2="690" y2="128"/><line x1="453" y1="158" x2="690" y2="148"/><line x1="453" y1="158" x2="690" y2="168"/><line x1="453" y1="158" x2="690" y2="188"/><line x1="453" y1="158" x2="690" y2="208"/>
    </g>
    <!-- 點雲示意 -->
    <g fill="#9A3412">
      <circle cx="600" cy="120" r="1.6"/><circle cx="640" cy="132" r="1.6"/><circle cx="610" cy="150" r="1.6"/><circle cx="660" cy="160" r="1.6"/><circle cx="620" cy="178" r="1.6"/><circle cx="650" cy="196" r="1.6"/><circle cx="585" cy="168" r="1.6"/><circle cx="670" cy="142" r="1.6"/>
    </g>
    <text x="563" y="293" text-anchor="middle" font-size="10" fill="#6B7280">每秒數萬~數百萬點 · 立體感知 · 戶外/自駕</text>
  </g>
</svg>

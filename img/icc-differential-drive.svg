<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="iv" markerWidth="11" markerHeight="11" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2563EB"/></marker></defs>
  <rect width="640" height="290" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#1F2937">差速公式不用背:全車繞同一個 ICC 旋轉</text>

  <!-- axle line -->
  <line x1="80" y1="185" x2="560" y2="185" stroke="#9CA3AF" stroke-width="1.3" stroke-dasharray="2 4"/>

  <!-- radii from ICC -->
  <line x1="80" y1="185" x2="380" y2="185" stroke="#D1D5DB" stroke-width="1"/>
  <!-- ICC -->
  <circle cx="80" cy="185" r="6" fill="#EA580C"/>
  <text x="80" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">ICC</text>
  <text x="80" y="226" text-anchor="middle" font-size="11" fill="#6B7280">瞬時旋轉中心</text>
  <path d="M104,165 A30 30 0 0 1 110,188" fill="none" stroke="#EA580C" stroke-width="2" marker-end="url(#iv)"/>
  <text x="126" y="160" font-size="13" font-weight="700" fill="#9A3412">ω</text>

  <!-- car body -->
  <rect x="360" y="150" width="140" height="70" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- wheels -->
  <rect x="372" y="176" width="16" height="18" rx="2" fill="#1F2937"/>
  <rect x="472" y="176" width="16" height="18" rx="2" fill="#1F2937"/>
  <text x="380" y="172" text-anchor="middle" font-size="11" fill="#1F2937">左輪(內)</text>
  <text x="480" y="172" text-anchor="middle" font-size="11" fill="#1F2937">右輪(外)</text>
  <circle cx="430" cy="185" r="3" fill="#3B82F6"/><text x="430" y="138" text-anchor="middle" font-size="11" fill="#1E40AF">車體中心 C</text>

  <!-- velocity arrows (up), length ∝ radius -->
  <line x1="380" y1="176" x2="380" y2="131" stroke="#2563EB" stroke-width="2.5" marker-end="url(#iv)"/>
  <text x="356" y="120" font-size="12" font-weight="700" fill="#1E40AF">vL</text>
  <line x1="480" y1="176" x2="480" y2="116" stroke="#2563EB" stroke-width="2.5" marker-end="url(#iv)"/>
  <text x="490" y="110" font-size="12" font-weight="700" fill="#1E40AF">vR</text>

  <!-- radius braces -->
  <text x="250" y="178" text-anchor="middle" font-size="12" fill="#374151">ICC→左輪 = R − b/2</text>
  <line x1="380" y1="232" x2="480" y2="232" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="380" y1="228" x2="380" y2="236" stroke="#9CA3AF"/><line x1="480" y1="228" x2="480" y2="236" stroke="#9CA3AF"/>
  <text x="430" y="246" text-anchor="middle" font-size="11" fill="#374151">輪距 b</text>

  <!-- derivation box -->
  <rect x="120" y="252" width="400" height="30" rx="6" fill="#FFF7ED" stroke="#F97316"/>
  <text x="320" y="272" text-anchor="middle" font-size="12.5" fill="#9A3412">同一個 ω → vL=ω(R−b/2), vR=ω(R+b/2) → v=(vL+vR)/2=ωR, ω=(vR−vL)/b</text>
</svg>

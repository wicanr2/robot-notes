<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 330" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="fl" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/></marker>
  </defs>
  <rect width="640" height="330" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#1F2937">為什麼要模擬主板:把又慢又不穩的韌體測試,變得又快又每次都一樣</text>

  <!-- LEFT: real board -->
  <text x="160" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">真板迴路</text>
  <g font-size="11.5" fill="#1F2937">
    <rect x="95" y="64" width="130" height="26" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="160" y="81" text-anchor="middle">改 code</text>
    <rect x="95" y="100" width="130" height="26" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="160" y="117" text-anchor="middle">編譯</text>
    <rect x="95" y="136" width="130" height="26" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="160" y="153" text-anchor="middle">燒錄(ST-Link)</text>
    <rect x="95" y="172" width="130" height="26" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="160" y="189" text-anchor="middle">重啟板子</text>
    <rect x="95" y="208" width="130" height="26" rx="5" fill="#FEF2F2" stroke="#EF4444"/><text x="160" y="225" text-anchor="middle">看 UART log 判斷</text>
  </g>
  <g stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#fl)">
    <line x1="160" y1="90" x2="160" y2="98"/><line x1="160" y1="126" x2="160" y2="134"/><line x1="160" y1="162" x2="160" y2="170"/><line x1="160" y1="198" x2="160" y2="206"/>
  </g>
  <path d="M95,221 C40,221 40,77 93,77" fill="none" stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#fl)"/>
  <rect x="60" y="248" width="200" height="62" rx="6" fill="#FEF2F2" stroke="#EF4444"/>
  <text x="160" y="267" text-anchor="middle" font-size="11.5" fill="#991B1B">十幾~數十秒 / 輪</text>
  <text x="160" y="285" text-anchor="middle" font-size="11.5" fill="#991B1B">race 時好時壞(難重現)</text>
  <text x="160" y="303" text-anchor="middle" font-size="11.5" fill="#991B1B">板子不夠分 · CI 跑不了</text>

  <line x1="320" y1="46" x2="320" y2="312" stroke="#E5E7EB"/>

  <!-- RIGHT: Renode -->
  <text x="480" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Renode 迴路</text>
  <g font-size="11.5" fill="#1F2937">
    <rect x="415" y="76" width="130" height="26" rx="5" fill="#ECFDF5" stroke="#10B981"/><text x="480" y="93" text-anchor="middle">改 code</text>
    <rect x="415" y="118" width="130" height="26" rx="5" fill="#ECFDF5" stroke="#10B981"/><text x="480" y="135" text-anchor="middle">編譯</text>
    <rect x="415" y="160" width="130" height="26" rx="5" fill="#ECFDF5" stroke="#10B981"/><text x="480" y="177" text-anchor="middle">Renode 跑(headless)</text>
    <rect x="415" y="202" width="130" height="26" rx="5" fill="#ECFDF5" stroke="#10B981"/><text x="480" y="219" text-anchor="middle">pass / fail</text>
  </g>
  <g stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#fl)">
    <line x1="480" y1="102" x2="480" y2="116"/><line x1="480" y1="144" x2="480" y2="158"/><line x1="480" y1="186" x2="480" y2="200"/>
  </g>
  <path d="M415,215 C360,215 360,89 413,89" fill="none" stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#fl)"/>
  <rect x="380" y="248" width="200" height="62" rx="6" fill="#ECFDF5" stroke="#10B981"/>
  <text x="480" y="267" text-anchor="middle" font-size="11.5" fill="#065F46">秒級 / 輪</text>
  <text x="480" y="285" text-anchor="middle" font-size="11.5" fill="#065F46">確定性可重現(同輸入同結果)</text>
  <text x="480" y="303" text-anchor="middle" font-size="11.5" fill="#065F46">可開 N 份 · 進 CI</text>
</svg>

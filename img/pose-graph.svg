<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="pg-b" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3B82F6"/></marker>
    <marker id="pg-v" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#8B5CF6"/></marker>
  </defs>
  <rect width="720" height="300" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">pose graph:節點 = 歷史位姿,邊 = 位姿間的相對約束</text>

  <!-- 節點 P1..P5 -->
  <g>
    <circle cx="90" cy="120" r="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="90" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">P1</text>
    <circle cx="228" cy="120" r="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="228" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">P2</text>
    <circle cx="366" cy="120" r="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="366" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">P3</text>
    <circle cx="504" cy="120" r="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="504" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">P4</text>
    <circle cx="642" cy="120" r="24" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="642" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">P5</text>
  </g>
  <!-- odometry/scan 約束邊 -->
  <g stroke="#3B82F6" stroke-width="2" marker-end="url(#pg-b)">
    <line x1="116" y1="120" x2="200" y2="120"/><line x1="254" y1="120" x2="338" y2="120"/><line x1="392" y1="120" x2="476" y2="120"/><line x1="530" y1="120" x2="614" y2="120"/>
  </g>
  <text x="360" y="92" text-anchor="middle" font-size="10" fill="#1E40AF">相鄰約束:odometry / scan matching</text>

  <!-- loop closure 邊 -->
  <path d="M642,144 C642,236 90,236 90,146" fill="none" stroke="#8B5CF6" stroke-width="2.2" stroke-dasharray="6,4" marker-end="url(#pg-v)"/>
  <text x="366" y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">loop closure 邊:P5 的 scan 跟 P1 附近超像 → 你們在同一個地方</text>

  <text x="360" y="270" text-anchor="middle" font-size="11" fill="#374151">加入這條邊後做全圖優化:把「P5 應該 ≈ P1」的矛盾,按各邊的「信心」(協方差)攤回 P2~P4 → 軌跡微調、地圖拉直</text>
</svg>

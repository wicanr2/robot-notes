<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="ta" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#DC2626"/></marker>
    <marker id="tb" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2563EB"/></marker>
  </defs>
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">OpenRMF 的根本差別:從「事後撞到」變「事前預測」</text>

  <!-- LEFT: each fleet blind -->
  <text x="160" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">各自為政:看不到對方意圖</text>
  <rect x="40" y="120" width="240" height="44" fill="#F3F4F6" stroke="#9CA3AF"/>
  <text x="72" y="146" font-size="18">🤖</text><line x1="92" y1="142" x2="150" y2="142" stroke="#2563EB" stroke-width="2.5" marker-end="url(#tb)"/>
  <text x="248" y="146" font-size="18" text-anchor="end">🤖</text><line x1="228" y1="142" x2="170" y2="142" stroke="#DC2626" stroke-width="2.5" marker-end="url(#ta)"/>
  <text x="160" y="138" text-anchor="middle" font-size="18">💥</text>
  <text x="160" y="190" text-anchor="middle" font-size="12.5" fill="#991B1B">A、B 兩家車隊互不知道對方</text>
  <text x="160" y="210" text-anchor="middle" font-size="12.5" fill="#991B1B">→ 走進窄道才卡死 / 死鎖</text>
  <text x="160" y="234" text-anchor="middle" font-size="11" fill="#6B7280">只能現場被動處理</text>

  <line x1="320" y1="44" x2="320" y2="280" stroke="#E5E7EB"/>

  <!-- RIGHT: shared space-time schedule -->
  <text x="480" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">共用時空排程:先把意圖攤在同一張圖</text>
  <!-- axes -->
  <line x1="370" y1="80" x2="370" y2="250" stroke="#9CA3AF" stroke-width="1.3"/>
  <line x1="370" y1="250" x2="600" y2="250" stroke="#9CA3AF" stroke-width="1.3"/>
  <text x="356" y="84" font-size="11" fill="#6B7280">時間</text>
  <text x="598" y="268" text-anchor="end" font-size="11" fill="#6B7280">位置(沿走道)</text>
  <!-- trajectory A (blue) -->
  <line x1="380" y1="240" x2="585" y2="95" stroke="#2563EB" stroke-width="2.6"/>
  <text x="588" y="95" font-size="11" fill="#1E40AF">A 車</text>
  <!-- trajectory B (red) -->
  <line x1="585" y1="240" x2="380" y2="95" stroke="#DC2626" stroke-width="2.6"/>
  <text x="360" y="98" font-size="11" fill="#991B1B">B 車</text>
  <!-- conflict -->
  <circle cx="482" cy="168" r="13" fill="none" stroke="#F97316" stroke-width="2.4"/>
  <text x="482" y="150" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9A3412">衝突</text>
  <text x="485" y="282" text-anchor="middle" font-size="11" fill="#065F46">時空上交疊 → 還沒走到就先協商(一方降速/等待/繞行)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="dn" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker>
    <marker id="dg" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/></marker>
  </defs>
  <rect width="640" height="290" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">差分訊號為何抗干擾:兩線拿到一樣的噪聲,取差就抵消</text>

  <!-- wire A -->
  <line x1="60" y1="90" x2="430" y2="90" stroke="#2563EB" stroke-width="3"/>
  <text x="46" y="94" text-anchor="end" font-size="12" font-weight="700" fill="#1E40AF">A</text>
  <text x="120" y="80" font-size="11.5" fill="#1E40AF">A = +S + N</text>
  <!-- wire B -->
  <line x1="60" y1="150" x2="430" y2="150" stroke="#DC2626" stroke-width="3"/>
  <text x="46" y="154" text-anchor="end" font-size="12" font-weight="700" fill="#991B1B">B</text>
  <text x="120" y="170" font-size="11.5" fill="#991B1B">B = −S + N</text>

  <!-- noise source hitting both equally -->
  <text x="250" y="40" text-anchor="middle" font-size="20">⚡</text>
  <text x="250" y="56" text-anchor="middle" font-size="11" fill="#9A3412">外界干擾 N</text>
  <line x1="250" y1="58" x2="240" y2="86" stroke="#F97316" stroke-width="1.8" marker-end="url(#dn)"/>
  <line x1="250" y1="58" x2="260" y2="146" stroke="#F97316" stroke-width="1.8" marker-end="url(#dn)"/>
  <text x="320" y="124" text-anchor="middle" font-size="11" fill="#9A3412">共模:兩線緊鄰/絞在一起 → 同時被加上「一樣的 N」</text>

  <!-- subtractor -->
  <path d="M430,70 L490,120 L430,170 Z" fill="#ECFDF5" stroke="#10B981" stroke-width="1.6"/>
  <text x="450" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">A−B</text>
  <text x="460" y="200" text-anchor="middle" font-size="11" fill="#065F46">接收端只看兩線電壓差</text>

  <!-- output -->
  <line x1="490" y1="120" x2="590" y2="120" stroke="#059669" stroke-width="3" marker-end="url(#dg)"/>
  <text x="540" y="110" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065F46">= 2S</text>

  <!-- algebra -->
  <rect x="120" y="226" width="400" height="48" rx="8" fill="#FFF7ED" stroke="#F97316"/>
  <text x="320" y="248" text-anchor="middle" font-size="13" fill="#9A3412">A − B = (+S + N) − (−S + N) = 2S　← N 被減掉了</text>
  <text x="320" y="266" text-anchor="middle" font-size="11" fill="#6B7280">訊號(差模)加倍、噪聲(共模)歸零 → 馬達旁的電磁噪聲環境也能可靠傳</text>
</svg>

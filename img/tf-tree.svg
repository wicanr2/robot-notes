<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="tt" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/></marker></defs>
  <rect width="640" height="380" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">TF tree:為什麼要分 map 與 odom 兩層</text>

  <!-- nodes -->
  <rect x="250" y="44" width="140" height="40" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.8"/><text x="320" y="69" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">map</text>
  <rect x="250" y="138" width="140" height="40" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/><text x="320" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">odom</text>
  <rect x="250" y="232" width="140" height="40" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.8"/><text x="320" y="257" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">base_link</text>
  <rect x="150" y="326" width="100" height="34" rx="6" fill="#F9FAFB" stroke="#9CA3AF"/><text x="200" y="348" text-anchor="middle" font-size="12" fill="#374151">laser</text>
  <rect x="270" y="326" width="100" height="34" rx="6" fill="#F9FAFB" stroke="#9CA3AF"/><text x="320" y="348" text-anchor="middle" font-size="12" fill="#374151">camera</text>
  <rect x="390" y="326" width="100" height="34" rx="6" fill="#F9FAFB" stroke="#9CA3AF"/><text x="440" y="348" text-anchor="middle" font-size="12" fill="#374151">imu</text>

  <!-- edges -->
  <line x1="320" y1="84" x2="320" y2="136" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#tt)"/>
  <line x1="320" y1="178" x2="320" y2="230" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#tt)"/>
  <line x1="320" y1="272" x2="200" y2="324" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#tt)"/>
  <line x1="320" y1="272" x2="320" y2="324" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#tt)"/>
  <line x1="320" y1="272" x2="440" y2="324" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#tt)"/>

  <!-- edge labels (left) -->
  <text x="332" y="114" font-size="10.5" fill="#5B21B6">AMCL 估(localization §22)</text>
  <text x="332" y="208" font-size="10.5" fill="#1E40AF">輪速 odometry 發(§4.1)</text>
  <text x="250" y="300" font-size="10.5" fill="#6B7280">static:感測器螺絲鎖死</text>

  <!-- right annotations -->
  <text x="406" y="58" font-size="10.5" fill="#5B21B6">長期準</text>
  <text x="406" y="72" font-size="10.5" fill="#991B1B">但會「跳一下」</text>
  <text x="406" y="152" font-size="10.5" fill="#1E40AF">連續、平滑</text>
  <text x="406" y="166" font-size="10.5" fill="#991B1B">但會慢慢漂</text>
  <text x="406" y="252" font-size="10.5" fill="#065F46">跟著車身</text>

  <!-- bottom rationale -->
  <rect x="40" y="290" width="200" height="26" rx="6" fill="#FFF7ED" stroke="#F97316"/>
  <text x="140" y="307" text-anchor="middle" font-size="10.5" fill="#9A3412">每個 frame 只有一個 parent</text>
  <text x="320" y="376" text-anchor="middle" font-size="11" fill="#374151">分兩層 → 同時要到「平滑(控制用 odom)」+「長期準(全域用 map)」</text>
</svg>

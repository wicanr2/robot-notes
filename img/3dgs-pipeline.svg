<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/>
    </marker>
  </defs>
  <rect width="900" height="250" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1F2937">感測器資料 → 3D 重建 → 虛擬世界</text>

  <!-- Stage A -->
  <rect x="30" y="70" width="220" height="130" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#1E3A8A">真實世界(原料)</text>
  <text x="140" y="128" text-anchor="middle" font-size="13" fill="#1F2937">相機 / LiDAR / 深度</text>
  <text x="140" y="150" text-anchor="middle" font-size="13" fill="#1F2937">多角度的 2D 觀測</text>
  <text x="140" y="178" text-anchor="middle" font-size="12" fill="#6B7280">「從各角度看到的世界」</text>

  <!-- Stage B -->
  <rect x="340" y="70" width="220" height="130" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="450" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#5B21B6">3D 重建(加工)</text>
  <text x="450" y="126" text-anchor="middle" font-size="13" fill="#1F2937">多張 2D 反推 3D</text>
  <text x="450" y="148" text-anchor="middle" font-size="13" fill="#1F2937">用高斯橢球表示</text>
  <!-- gaussian ellipsoids hint -->
  <ellipse cx="415" cy="176" rx="20" ry="9" fill="#C4B5FD" opacity="0.8"/>
  <ellipse cx="450" cy="180" rx="13" ry="13" fill="#A78BFA" opacity="0.8"/>
  <ellipse cx="485" cy="175" rx="22" ry="8" fill="#DDD6FE" opacity="0.9" transform="rotate(-20 485 175)"/>

  <!-- Stage C -->
  <rect x="650" y="70" width="220" height="130" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="760" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#065F46">虛擬世界(成品)</text>
  <text x="760" y="126" text-anchor="middle" font-size="13" fill="#1F2937">數位分身 / 模擬場景</text>
  <text x="760" y="148" text-anchor="middle" font-size="13" fill="#1F2937">放機器人閉迴路測試</text>
  <text x="760" y="178" text-anchor="middle" font-size="12" fill="#6B7280">生成大量合成訓練資料</text>

  <!-- arrows -->
  <line x1="252" y1="135" x2="336" y2="135" stroke="#F97316" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="294" y="125" text-anchor="middle" font-size="12" fill="#9A3412">拍攝/掃描</text>
  <line x1="562" y1="135" x2="646" y2="135" stroke="#F97316" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="604" y="125" text-anchor="middle" font-size="12" fill="#9A3412">重建</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 290" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="ov" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2563EB"/></marker>
    <marker id="og" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/></marker>
  </defs>
  <rect width="560" height="290" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">odometry 積分:把「車體前進」轉到世界座標</text>
  <text x="280" y="46" text-anchor="middle" font-size="12" fill="#6B7280">cos/sin 不是天上掉的——是把車頭方向的位移投影到世界 x、y 軸</text>

  <!-- world axes -->
  <line x1="60" y1="250" x2="520" y2="250" stroke="#9CA3AF" stroke-width="1.3" marker-end="url(#og)"/>
  <line x1="70" y1="260" x2="70" y2="70" stroke="#9CA3AF" stroke-width="1.3" marker-end="url(#og)"/>
  <text x="515" y="270" font-size="12" fill="#6B7280">世界 x</text>
  <text x="46" y="78" font-size="12" fill="#6B7280">世界 y</text>

  <!-- P0 -->
  <circle cx="170" cy="210" r="4" fill="#1F2937"/>
  <text x="150" y="228" font-size="12" fill="#374151">起點 (x, y, θ)</text>
  <!-- displacement Δs at midpoint heading -->
  <line x1="170" y1="210" x2="357" y2="116" stroke="#2563EB" stroke-width="3" marker-end="url(#ov)"/>
  <text x="248" y="150" font-size="13" font-weight="700" fill="#1E40AF" transform="rotate(-27 248 150)">Δs(車頭方向前進)</text>
  <circle cx="360" cy="113" r="4" fill="#2563EB"/>
  <text x="368" y="110" font-size="12" fill="#1E40AF">新位置</text>

  <!-- decomposition -->
  <line x1="170" y1="210" x2="360" y2="210" stroke="#9CA3AF" stroke-width="1.6" stroke-dasharray="5 3"/>
  <line x1="360" y1="210" x2="360" y2="113" stroke="#9CA3AF" stroke-width="1.6" stroke-dasharray="5 3"/>
  <!-- right-angle marker -->
  <path d="M347,210 L347,197 L360,197" fill="none" stroke="#6B7280" stroke-width="1.3"/>
  <text x="262" y="226" text-anchor="middle" font-size="12" fill="#374151">Δx = Δs·cos(θ+Δθ/2)</text>
  <text x="370" y="158" font-size="12" fill="#374151">Δy = Δs·sin(θ+Δθ/2)</text>

  <!-- heading angle arc -->
  <line x1="170" y1="210" x2="240" y2="210" stroke="#D1D5DB" stroke-width="1"/>
  <path d="M212,210 A42 42 0 0 0 200,182" fill="none" stroke="#EA580C" stroke-width="1.8"/>
  <text x="220" y="200" font-size="12" font-weight="700" fill="#9A3412">θ+Δθ/2</text>

  <!-- midpoint note -->
  <rect x="120" y="256" width="320" height="28" rx="6" fill="#FFF7ED" stroke="#F97316"/>
  <text x="280" y="274" text-anchor="middle" font-size="11.5" fill="#9A3412">這一步朝向從 θ 轉到 θ+Δθ,用中點 θ+Δθ/2 投影 → 少一階誤差(中點法)</text>
</svg>

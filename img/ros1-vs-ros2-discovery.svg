<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="dv-g" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#6B7280"/></marker>
    <marker id="dv-r" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#EF4444"/></marker>
  </defs>
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">為什麼用 DDS:從「中央 master」到「去中心化自動發現」</text>
  <line x1="360" y1="52" x2="360" y2="356" stroke="#E5E7EB" stroke-width="1.4"/>

  <!-- 左:ROS 1 -->
  <text x="180" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">ROS 1:中央 master</text>
  <rect x="138" y="150" width="84" height="40" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.6"/>
  <text x="180" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">roscore</text>
  <text x="180" y="182" text-anchor="middle" font-size="9" fill="#991B1B">(master)</text>
  <g font-size="10" fill="#374151">
    <rect x="80" y="92" width="58" height="28" rx="6" fill="#fff" stroke="#9CA3AF"/><text x="109" y="110" text-anchor="middle">節點 A</text>
    <rect x="222" y="92" width="58" height="28" rx="6" fill="#fff" stroke="#9CA3AF"/><text x="251" y="110" text-anchor="middle">節點 B</text>
    <rect x="80" y="232" width="58" height="28" rx="6" fill="#fff" stroke="#9CA3AF"/><text x="109" y="250" text-anchor="middle">節點 C</text>
    <rect x="222" y="232" width="58" height="28" rx="6" fill="#fff" stroke="#9CA3AF"/><text x="251" y="250" text-anchor="middle">節點 D</text>
  </g>
  <g stroke="#9CA3AF" stroke-width="1.3">
    <line x1="125" y1="120" x2="160" y2="150"/><line x1="235" y1="120" x2="200" y2="150"/><line x1="125" y1="232" x2="160" y2="190"/><line x1="235" y1="232" x2="200" y2="190"/>
  </g>
  <text x="180" y="290" text-anchor="middle" font-size="10.5" fill="#374151">所有節點先到 master 登記,才找得到彼此</text>
  <text x="180" y="312" text-anchor="middle" font-size="10.5" font-weight="700" fill="#B91C1C">master 一掛 → 大家互相找不到(單點故障)</text>

  <!-- 右:ROS 2 -->
  <text x="540" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">ROS 2:DDS 去中心化</text>
  <g font-size="10" fill="#374151">
    <rect x="440" y="100" width="58" height="28" rx="6" fill="#ECFDF5" stroke="#10B981"/><text x="469" y="118" text-anchor="middle">節點 A</text>
    <rect x="582" y="100" width="58" height="28" rx="6" fill="#ECFDF5" stroke="#10B981"/><text x="611" y="118" text-anchor="middle">節點 B</text>
    <rect x="440" y="224" width="58" height="28" rx="6" fill="#ECFDF5" stroke="#10B981"/><text x="469" y="242" text-anchor="middle">節點 C</text>
    <rect x="582" y="224" width="58" height="28" rx="6" fill="#ECFDF5" stroke="#10B981"/><text x="611" y="242" text-anchor="middle">節點 D</text>
  </g>
  <!-- 全互聯(去中心化)-->
  <g stroke="#10B981" stroke-width="1.2" opacity="0.8">
    <line x1="498" y1="114" x2="582" y2="114"/><line x1="469" y1="128" x2="469" y2="224"/><line x1="611" y1="128" x2="611" y2="224"/><line x1="498" y1="238" x2="582" y2="238"/>
    <line x1="498" y1="121" x2="585" y2="231"/><line x1="582" y1="121" x2="495" y2="231"/>
  </g>
  <text x="540" y="290" text-anchor="middle" font-size="10.5" fill="#374151">節點上線後靠 DDS 自動發現彼此,直接互傳</text>
  <text x="540" y="312" text-anchor="middle" font-size="10.5" font-weight="700" fill="#065F46">沒有中央節點,一個掛不影響其他</text>

  <text x="360" y="350" text-anchor="middle" font-size="10" fill="#6B7280">代價:去中心化發現靠多播,跨網段 / docker bridge 容易不通(見多容器部署篇)</text>
</svg>

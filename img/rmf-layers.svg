<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="ra" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/></marker></defs>
  <rect width="640" height="320" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">OpenRMF 不取代各家車隊,而是疊在上面做協調</text>

  <!-- OpenRMF top layer -->
  <rect x="40" y="44" width="560" height="58" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.8"/>
  <text x="320" y="68" text-anchor="middle" font-size="15" font-weight="700" fill="#5B21B6">OpenRMF:跨車隊交通管理 + 統一派工</text>
  <text x="320" y="90" text-anchor="middle" font-size="12" fill="#6B7280">rmf_traffic(時空排程去衝突) · rmf_task(競標派工) · 門/電梯 adapter</text>

  <!-- adapters row -->
  <g font-size="11.5">
    <rect x="48" y="150" width="126" height="40" rx="6" fill="#EFF6FF" stroke="#3B82F6"/><text x="111" y="167" text-anchor="middle" fill="#1E40AF">A 廠私有 adapter</text><text x="111" y="183" text-anchor="middle" font-size="10" fill="#6B7280">對接私有 API</text>
    <rect x="186" y="150" width="126" height="40" rx="6" fill="#FFF7ED" stroke="#F97316"/><text x="249" y="167" text-anchor="middle" fill="#9A3412">VDA5050 adapter</text><text x="249" y="183" text-anchor="middle" font-size="10" fill="#9A3412">⚠ 官方仍 roadmap</text>
    <rect x="324" y="150" width="126" height="40" rx="6" fill="#EFF6FF" stroke="#3B82F6"/><text x="387" y="167" text-anchor="middle" fill="#1E40AF">MiR adapter</text><text x="387" y="183" text-anchor="middle" font-size="10" fill="#6B7280">現成範例</text>
    <rect x="462" y="150" width="126" height="40" rx="6" fill="#EFF6FF" stroke="#3B82F6"/><text x="525" y="167" text-anchor="middle" fill="#1E40AF">自家 ROS2 車隊</text><text x="525" y="183" text-anchor="middle" font-size="10" fill="#6B7280">fleet adapter</text>
  </g>
  <text x="320" y="128" text-anchor="middle" font-size="11.5" fill="#6B7280">每家車隊各透過「一個 fleet adapter」接入(翻譯 RMF 指令 ↔ 各家協議)</text>

  <!-- robots row -->
  <g font-size="11.5" fill="#991B1B">
    <rect x="48" y="252" width="126" height="36" rx="6" fill="#FEF2F2" stroke="#EF4444"/><text x="111" y="274" text-anchor="middle">A 廠車隊</text>
    <rect x="186" y="252" width="126" height="36" rx="6" fill="#FEF2F2" stroke="#EF4444"/><text x="249" y="274" text-anchor="middle">支援 VDA5050 的車</text>
    <rect x="324" y="252" width="126" height="36" rx="6" fill="#FEF2F2" stroke="#EF4444"/><text x="387" y="274" text-anchor="middle">MiR 車隊</text>
    <rect x="462" y="252" width="126" height="36" rx="6" fill="#FEF2F2" stroke="#EF4444"/><text x="525" y="274" text-anchor="middle">ROS2 車隊</text>
  </g>

  <!-- arrows -->
  <g stroke="#9CA3AF" stroke-width="1.4" marker-end="url(#ra)">
    <line x1="111" y1="102" x2="111" y2="148"/><line x1="249" y1="102" x2="249" y2="148"/><line x1="387" y1="102" x2="387" y2="148"/><line x1="525" y1="102" x2="525" y2="148"/>
    <line x1="111" y1="190" x2="111" y2="250"/><line x1="249" y1="190" x2="249" y2="250"/><line x1="387" y1="190" x2="387" y2="250"/><line x1="525" y1="190" x2="525" y2="250"/>
  </g>
  <text x="320" y="308" text-anchor="middle" font-size="11" fill="#6B7280">各廠保留自己的導航與避障(IP);RMF 補的是「全局意圖可見」這塊缺口</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="ad" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3B82F6"/></marker>
    <marker id="au" markerWidth="11" markerHeight="11" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#10B981"/></marker>
  </defs>
  <rect width="640" height="300" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">Fleet Adapter:RMF 標準指令 ↔ 車隊私有 API 的雙向翻譯</text>

  <!-- RMF top -->
  <rect x="180" y="46" width="280" height="40" rx="9" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.6"/>
  <text x="320" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">OpenRMF(派工 + 交通協商)</text>

  <!-- Adapter center -->
  <rect x="180" y="128" width="280" height="44" rx="9" fill="#ECFDF5" stroke="#10B981" stroke-width="1.8"/>
  <text x="320" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Fleet Adapter(你寫的這層)</text>
  <text x="320" y="165" text-anchor="middle" font-size="10" fill="#6B7280">翻譯 RMF ↔ 車隊;存住 RobotUpdateHandle</text>

  <!-- 車隊 bottom -->
  <rect x="180" y="214" width="280" height="40" rx="9" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.6"/>
  <text x="320" y="239" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">車隊(私有 API / VDA5050)</text>

  <!-- down: commands -->
  <line x1="250" y1="86" x2="250" y2="126" stroke="#3B82F6" stroke-width="2" marker-end="url(#ad)"/>
  <line x1="250" y1="172" x2="250" y2="212" stroke="#3B82F6" stroke-width="2" marker-end="url(#ad)"/>
  <text x="40" y="120" font-size="11" font-weight="700" fill="#1E40AF">↓ 往車隊下指令</text>
  <text x="40" y="138" font-size="10" fill="#374151">navigate(目的地)</text>
  <text x="40" y="154" font-size="10" fill="#374151">stop()</text>
  <text x="40" y="170" font-size="10" fill="#374151">execute_action(pick/drop)</text>

  <!-- up: state -->
  <line x1="390" y1="212" x2="390" y2="172" stroke="#10B981" stroke-width="2" marker-end="url(#au)"/>
  <line x1="390" y1="126" x2="390" y2="88" stroke="#10B981" stroke-width="2" marker-end="url(#au)"/>
  <text x="470" y="120" font-size="11" font-weight="700" fill="#065F46">↑ 從車隊讀狀態</text>
  <text x="470" y="138" font-size="10" fill="#374151">position() [x,y,θ]</text>
  <text x="470" y="154" font-size="10" fill="#374151">map() / battery_soc()</text>
  <text x="470" y="170" font-size="10" fill="#374151">is_command_completed()</text>

  <text x="320" y="284" text-anchor="middle" font-size="11" fill="#6B7280">選整合層級:Full Control(RMF 規劃整路)/ Easy Full Control(填 callback)/ Traffic Light(車自己導航)</text>
</svg>

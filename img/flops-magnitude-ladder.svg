<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="800" height="420" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">FLOPS 量級階梯:每往上一階 ×1000</text>
  <text x="400" y="52" text-anchor="middle" font-size="12.5" fill="#6B7280">FLOPS = 每秒幾次浮點運算(做事多快);每階差三個零</text>

  <!-- ladder steps, bottom to top -->
  <!-- helper: each step is a rectangle; higher = bigger -->
  <!-- k -->
  <rect x="70" y="350" width="190" height="36" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.3"/>
  <text x="90" y="373" font-size="14" font-weight="700" fill="#1E40AF">kFLOPS</text>
  <text x="178" y="373" font-size="11.5" fill="#6B7280">10³ 千</text>
  <text x="290" y="373" font-size="12" fill="#374151">1980s 家用電腦</text>

  <!-- M -->
  <rect x="70" y="306" width="220" height="36" rx="5" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.3"/>
  <text x="90" y="329" font-size="14" font-weight="700" fill="#1E40AF">MFLOPS</text>
  <text x="180" y="329" font-size="11.5" fill="#6B7280">10⁶ 百萬</text>
  <text x="320" y="329" font-size="12" fill="#374151">1990s PC</text>

  <!-- G -->
  <rect x="70" y="262" width="250" height="36" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="90" y="285" font-size="14" font-weight="700" fill="#1E40AF">GFLOPS</text>
  <text x="182" y="285" font-size="11.5" fill="#6B7280">10⁹ 十億</text>
  <text x="350" y="285" font-size="12" fill="#374151">2000s CPU / 入門 GPU</text>

  <!-- T -->
  <rect x="70" y="218" width="290" height="36" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="90" y="241" font-size="14" font-weight="700" fill="#1E40AF">TFLOPS</text>
  <text x="182" y="241" font-size="11.5" fill="#6B7280">10¹² 兆</text>
  <text x="390" y="241" font-size="12" fill="#374151">一張現代遊戲顯卡</text>

  <!-- P  highlighted -->
  <rect x="70" y="170" width="370" height="40" rx="5" fill="#FFEDD5" stroke="#EA580C" stroke-width="2.2"/>
  <text x="90" y="195" font-size="15" font-weight="700" fill="#9A3412">PFLOPS</text>
  <text x="195" y="195" font-size="12" font-weight="700" fill="#9A3412">10¹⁵ 千兆(Peta)</text>
  <text x="330" y="195" font-size="11.5" font-weight="700" fill="#9A3412">← GB10 ~1 PFLOP(FP4)</text>

  <!-- E -->
  <rect x="70" y="126" width="370" height="36" rx="5" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.3"/>
  <text x="90" y="149" font-size="14" font-weight="700" fill="#1E3A8A">EFLOPS</text>
  <text x="184" y="149" font-size="11.5" fill="#6B7280">10¹⁸ 百京(Exa)</text>
  <text x="470" y="149" font-size="12" fill="#374151">2020s 頂級超算叢集</text>

  <!-- x1000 markers on the left -->
  <text x="30" y="290" text-anchor="middle" font-size="11" fill="#DC2626" transform="rotate(-90,30,255)">每階 ×1000</text>

  <!-- right reminder box -->
  <rect x="560" y="218" width="220" height="120" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="670" y="242" text-anchor="middle" font-size="12.5" font-weight="700" fill="#374151">記法</text>
  <text x="575" y="266" font-size="11.5" fill="#374151">Peta = 10¹⁵ = 一千個 Tera</text>
  <text x="575" y="290" font-size="11.5" fill="#374151">FLOPS(大寫S)= 速率 /s</text>
  <text x="575" y="314" font-size="11.5" fill="#374151">FLOPs(小寫s)= 數量(複數)</text>

  <text x="400" y="408" text-anchor="middle" font-size="11.5" fill="#9CA3AF">看到「1 PetaFLOP」先別激動:要追問是哪種精度、有沒有含 sparsity(見精度對吞吐那張圖)</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 420" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="740" height="420" fill="#ffffff"/>
  <text x="370" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">自注意力:「會」這個 token 去參考句中其他 token</text>
  <text x="370" y="52" text-anchor="middle" font-size="12.5" fill="#6B7280">query 比對每個 key 的相似度 → 當權重 → 把 value 加權平均 → 「會」的新表示</text>

  <!-- sentence tokens along the top -->
  <!-- tokens: 我 下午 有個 會 要 開 -->
  <g font-size="13" font-weight="700">
    <rect x="60"  y="90" width="56" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="88"  y="116" text-anchor="middle" fill="#374151">我</text>
    <rect x="130" y="90" width="56" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="158" y="116" text-anchor="middle" fill="#374151">下午</text>
    <rect x="200" y="90" width="56" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="228" y="116" text-anchor="middle" fill="#374151">有個</text>
    <!-- target token -->
    <rect x="270" y="86" width="56" height="48" rx="6" fill="#FFEDD5" stroke="#EA580C" stroke-width="2.2"/>
    <text x="298" y="116" text-anchor="middle" fill="#9A3412">會</text>
    <rect x="340" y="90" width="56" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="368" y="116" text-anchor="middle" fill="#374151">要</text>
    <rect x="410" y="90" width="56" height="40" rx="6" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="438" y="116" text-anchor="middle" fill="#374151">開</text>
  </g>
  <text x="298" y="78" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9A3412">目標 token(發出 query)</text>

  <!-- query origin -->
  <circle cx="298" cy="150" r="4" fill="#EA580C"/>
  <text x="298" y="170" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9A3412">query:「我該參考誰?」</text>

  <!-- attention lines from 會 to each token's key (thickness = similarity) -->
  <!-- 開 highest -->
  <line x1="298" y1="150" x2="438" y2="200" stroke="#16A34A" stroke-width="6" opacity="0.85"/>
  <!-- 下午 medium -->
  <line x1="298" y1="150" x2="158" y2="200" stroke="#3B82F6" stroke-width="2.5" opacity="0.7"/>
  <!-- 要 low -->
  <line x1="298" y1="150" x2="368" y2="200" stroke="#9CA3AF" stroke-width="1.5" opacity="0.6"/>
  <!-- 我 low -->
  <line x1="298" y1="150" x2="88" y2="200" stroke="#9CA3AF" stroke-width="1.2" opacity="0.5"/>
  <!-- 有個 low -->
  <line x1="298" y1="150" x2="228" y2="200" stroke="#9CA3AF" stroke-width="1.2" opacity="0.5"/>

  <!-- key+value boxes -->
  <g font-size="11">
    <rect x="64"  y="200" width="48" height="46" rx="5" fill="#F9FAFB" stroke="#D1D5DB"/>
    <text x="88"  y="220" text-anchor="middle" fill="#6B7280">key</text>
    <text x="88"  y="238" text-anchor="middle" fill="#374151" font-weight="700">0.05</text>
    <rect x="134" y="200" width="48" height="46" rx="5" fill="#F9FAFB" stroke="#D1D5DB"/>
    <text x="158" y="220" text-anchor="middle" fill="#6B7280">key</text>
    <text x="158" y="238" text-anchor="middle" fill="#1E40AF" font-weight="700">0.15</text>
    <rect x="204" y="200" width="48" height="46" rx="5" fill="#F9FAFB" stroke="#D1D5DB"/>
    <text x="228" y="220" text-anchor="middle" fill="#6B7280">key</text>
    <text x="228" y="238" text-anchor="middle" fill="#374151" font-weight="700">0.05</text>
    <rect x="344" y="200" width="48" height="46" rx="5" fill="#F9FAFB" stroke="#D1D5DB"/>
    <text x="368" y="220" text-anchor="middle" fill="#6B7280">key</text>
    <text x="368" y="238" text-anchor="middle" fill="#374151" font-weight="700">0.10</text>
    <rect x="414" y="200" width="48" height="46" rx="5" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.6"/>
    <text x="438" y="220" text-anchor="middle" fill="#15803D">key</text>
    <text x="438" y="238" text-anchor="middle" fill="#15803D" font-weight="700">0.60</text>
  </g>
  <text x="540" y="226" font-size="11.5" fill="#6B7280">← 注意力權重(相似度),總和=1</text>

  <!-- weighted sum to new representation -->
  <line x1="298" y1="246" x2="298" y2="300" stroke="#9CA3AF" stroke-width="2"/>
  <polygon points="293,300 298,310 303,300" fill="#9CA3AF"/>
  <text x="298" y="266" text-anchor="middle" font-size="11" fill="#9CA3AF">Σ value × 權重</text>

  <rect x="170" y="312" width="256" height="52" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.8"/>
  <text x="298" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">「會」的新表示</text>
  <text x="298" y="356" text-anchor="middle" font-size="11.5" fill="#374151">被權重最高的「開」拉向 → 會議(而非能夠)</text>

  <text x="370" y="396" text-anchor="middle" font-size="11.5" fill="#9CA3AF">所有 token 同時各做一次這個動作,而且可平行算——這是 Transformer 能規模化的關鍵</text>
</svg>

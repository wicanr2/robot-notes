<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="fu" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#9CA3AF"/></marker></defs>
  <rect width="680" height="360" fill="#ffffff"/>
  <text x="340" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">叉車 URDF 結構:底盤差速、貨叉用 prismatic 升降</text>

  <!-- link tree (left) -->
  <rect x="60" y="56" width="200" height="48" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="160" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">base_link</text>
  <text x="160" y="94" text-anchor="middle" font-size="10" fill="#6B7280">差速底盤(2 主動輪 + 腳輪)</text>

  <line x1="160" y1="104" x2="160" y2="134" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#fu)"/>
  <text x="172" y="123" font-size="10" fill="#374151">fixed joint</text>

  <rect x="60" y="136" width="200" height="44" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.6"/>
  <text x="160" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">mast_link</text>
  <text x="160" y="172" text-anchor="middle" font-size="10" fill="#6B7280">門架(垂直柱)</text>

  <line x1="160" y1="180" x2="160" y2="212" stroke="#F97316" stroke-width="2" marker-end="url(#fu)"/>
  <text x="172" y="200" font-size="10" font-weight="700" fill="#9A3412">prismatic(Z 軸,0~1.5m)</text>

  <rect x="60" y="214" width="200" height="48" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.8"/>
  <text x="160" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">fork_carriage_link</text>
  <text x="160" y="252" text-anchor="middle" font-size="10" fill="#6B7280">貨叉托架(上下升降)</text>

  <line x1="160" y1="262" x2="160" y2="292" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#fu)"/>
  <text x="172" y="281" font-size="10" fill="#374151">fixed joint</text>

  <rect x="60" y="294" width="200" height="40" rx="8" fill="#F3F4F6" stroke="#9CA3AF"/>
  <text x="160" y="319" text-anchor="middle" font-size="12.5" font-weight="700" fill="#374151">貨叉 fork tines</text>

  <!-- annotations (right) -->
  <line x1="320" y1="50" x2="320" y2="340" stroke="#E5E7EB"/>
  <text x="340" y="74" font-size="12" font-weight="700" fill="#1E40AF">base_link 掛:</text>
  <text x="340" y="94" font-size="11" fill="#1F2937">• DiffDrive plugin(吃 /cmd_vel,出 /odom、tf)</text>
  <text x="340" y="113" font-size="11" fill="#1F2937">• gpu_lidar → /scan、imu → /imu(餵 Nav2/SLAM)</text>

  <text x="340" y="160" font-size="12" font-weight="700" fill="#9A3412">prismatic 升降關節:</text>
  <text x="340" y="180" font-size="11" fill="#1F2937">• ros2_control + JointTrajectoryController</text>
  <text x="340" y="199" font-size="11" fill="#1F2937">• 升到指定高度(對應 pick/drop 動作)</text>

  <text x="340" y="240" font-size="12" font-weight="700" fill="#9A3412">fork_carriage = 取放的關鍵 link:</text>
  <text x="340" y="260" font-size="11" fill="#1F2937">• 當 DetachableJoint 的 parent_link</text>
  <text x="340" y="279" font-size="11" fill="#1F2937">• 對位 + 升起後,發 attach topic 綁住棧板</text>
  <text x="340" y="298" font-size="11" fill="#1F2937">• 到點發 detach topic 放下</text>

  <rect x="334" y="312" width="306" height="30" rx="6" fill="#FFF7ED" stroke="#F97316"/>
  <text x="487" y="331" text-anchor="middle" font-size="10.5" fill="#9A3412">簡化:真實叉車後輪轉向,demo 用差速最好接 Nav2</text>
</svg>

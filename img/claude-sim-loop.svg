<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="cl-a" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6B7280"/></marker>
    <marker id="cl-o" markerWidth="10" markerHeight="10" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#F97316"/></marker>
  </defs>
  <rect width="760" height="430" fill="#ffffff"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">一輪 agent 驅動流程:訓練差速底盤在餐廳導航</text>

  <!-- ① 你說目標 -->
  <rect x="30" y="52" width="240" height="58" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="44" y="72" font-size="12" font-weight="700" fill="#1E40AF">① 你說目標(人)</text>
  <text x="44" y="90" font-size="9.5" fill="#374151">「門口到 5 號桌,平滑、</text>
  <text x="44" y="104" font-size="9.5" fill="#374151"> 不撞動態行人、少急停」</text>

  <!-- ② Claude 建環境 -->
  <rect x="30" y="128" width="240" height="76" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="44" y="148" font-size="12" font-weight="700" fill="#065F46">② Claude 建 RL 環境</text>
  <text x="44" y="166" font-size="9.5" fill="#374151">obs = LiDAR + 目標位姿 + 速度</text>
  <text x="44" y="181" font-size="9.5" fill="#374151">action = (v, ω)</text>
  <text x="44" y="196" font-size="9.5" fill="#374151">reward = 到點 − 碰撞 − 急停 − 時間</text>

  <line x1="150" y1="110" x2="150" y2="126" stroke="#6B7280" stroke-width="2" marker-end="url(#cl-a)"/>
  <line x1="270" y1="166" x2="318" y2="166" stroke="#6B7280" stroke-width="2" marker-end="url(#cl-a)"/>

  <!-- 迭代迴圈 ③④⑤ -->
  <rect x="312" y="56" width="270" height="232" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.4" stroke-dasharray="6,4"/>
  <text x="447" y="76" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9A3412">迭代迴圈(反覆到指標達標)</text>

  <rect x="332" y="88" width="230" height="50" rx="7" fill="#fff" stroke="#F59E0B"/>
  <text x="344" y="107" font-size="11" font-weight="700" fill="#9A3412">③ headless 跑模擬</text>
  <text x="344" y="125" font-size="9.5" fill="#6B7280">數千環境平行、固定種子、跑固定 iteration</text>

  <rect x="332" y="150" width="230" height="50" rx="7" fill="#fff" stroke="#F59E0B"/>
  <text x="344" y="169" font-size="11" font-weight="700" fill="#9A3412">④ Claude 讀結果</text>
  <text x="344" y="187" font-size="9.5" fill="#6B7280">reward 曲線、success、碰撞率、急停次數</text>

  <rect x="332" y="212" width="230" height="56" rx="7" fill="#fff" stroke="#F59E0B"/>
  <text x="344" y="231" font-size="11" font-weight="700" fill="#9A3412">⑤ Claude 調整</text>
  <text x="344" y="249" font-size="9.5" fill="#6B7280">「success 高但急停多</text>
  <text x="344" y="263" font-size="9.5" fill="#6B7280"> → 加大 jerk 懲罰權重」</text>

  <line x1="447" y1="138" x2="447" y2="148" stroke="#F97316" stroke-width="2" marker-end="url(#cl-o)"/>
  <line x1="447" y1="200" x2="447" y2="210" stroke="#F97316" stroke-width="2" marker-end="url(#cl-o)"/>
  <!-- ⑤ 回 ③ -->
  <path d="M566,240 C600,240 600,113 566,113" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#cl-o)"/>
  <text x="612" y="180" font-size="9.5" fill="#9A3412">改完</text>
  <text x="612" y="194" font-size="9.5" fill="#9A3412">再跑</text>

  <!-- ⑥ ⑦ -->
  <line x1="447" y1="288" x2="447" y2="310" stroke="#6B7280" stroke-width="2" marker-end="url(#cl-a)"/>
  <text x="486" y="303" font-size="9.5" fill="#374151">指標達標</text>
  <rect x="232" y="312" width="200" height="50" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.4"/>
  <text x="246" y="331" font-size="11.5" font-weight="700" fill="#5B21B6">⑥ 域隨機化</text>
  <text x="246" y="349" font-size="9.5" fill="#6B7280">放開隨機:摩擦、噪聲、行人軌跡 → 逼泛化</text>
  <rect x="450" y="312" width="200" height="50" rx="8" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.4"/>
  <text x="464" y="331" font-size="11.5" font-weight="700" fill="#5B21B6">⑦ 匯出 policy</text>
  <text x="464" y="349" font-size="9.5" fill="#6B7280">.pt → ONNX → 進 sim-to-real</text>
  <line x1="432" y1="337" x2="448" y2="337" stroke="#6B7280" stroke-width="2" marker-end="url(#cl-a)"/>

  <text x="380" y="392" text-anchor="middle" font-size="11" fill="#374151">Claude 的動作全在「改設定/程式 → 讀數字 → 再改」這層</text>
  <text x="380" y="410" text-anchor="middle" font-size="10" fill="#6B7280">③ 的物理由 Isaac / PhysX 算、訓練靠 GPU——Claude 都不取代,只負責迭代</text>
</svg>

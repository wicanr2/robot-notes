<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <rect width="840" height="420" fill="#ffffff"/>
  <text x="420" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1F2937">獨顯記憶體 vs 統一記憶體:對「跑大模型」的差別</text>

  <!-- LEFT: discrete -->
  <text x="210" y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#1E40AF">一般獨顯 GPU(分離記憶體)</text>

  <!-- CPU + its RAM -->
  <rect x="40" y="86" width="150" height="60" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="115" y="112" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">CPU</text>
  <text x="115" y="132" text-anchor="middle" font-size="11" fill="#374151">系統記憶體(大)</text>

  <!-- slow copy arrow -->
  <line x1="190" y1="116" x2="240" y2="116" stroke="#DC2626" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="240,111 250,116 240,121" fill="#DC2626"/>
  <line x1="240" y1="128" x2="190" y2="128" stroke="#DC2626" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="190,123 180,128 190,133" fill="#DC2626"/>
  <text x="215" y="158" text-anchor="middle" font-size="9.5" fill="#DC2626">複製來回</text>

  <!-- GPU + VRAM -->
  <rect x="250" y="86" width="150" height="60" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="325" y="112" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9A3412">GPU</text>
  <text x="325" y="132" text-anchor="middle" font-size="11" fill="#374151">VRAM(HBM,快)</text>

  <!-- VRAM capacity bar (small) -->
  <rect x="40" y="180" width="360" height="40" rx="5" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="44" y="184" width="70" height="32" rx="3" fill="#FB923C"/>
  <text x="79" y="205" text-anchor="middle" font-size="10.5" fill="#fff" font-weight="700">24GB</text>
  <text x="270" y="205" text-anchor="middle" font-size="11.5" fill="#9A3412">VRAM 容量小</text>

  <!-- model doesn't fit -->
  <rect x="40" y="232" width="360" height="64" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.4"/>
  <text x="220" y="256" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991B1B">✗ 70B 模型(FP16 約 140GB)塞不進</text>
  <text x="220" y="278" text-anchor="middle" font-size="11" fill="#374151">頻寬高(跑得快),但容量裝不下大模型</text>

  <!-- divider -->
  <line x1="420" y1="80" x2="420" y2="380" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- RIGHT: unified -->
  <text x="630" y="64" text-anchor="middle" font-size="15" font-weight="700" fill="#15803D">GB10 統一記憶體(共享)</text>

  <!-- CPU and GPU share one memory -->
  <rect x="460" y="86" width="100" height="60" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="510" y="120" text-anchor="middle" font-size="12.5" font-weight="700" fill="#15803D">CPU</text>
  <rect x="700" y="86" width="100" height="60" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="750" y="120" text-anchor="middle" font-size="12.5" font-weight="700" fill="#15803D">GPU</text>

  <!-- shared memory block -->
  <rect x="460" y="158" width="340" height="56" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.8"/>
  <text x="630" y="182" text-anchor="middle" font-size="12.5" font-weight="700" fill="#15803D">一塊共享記憶體 128GB LPDDR5x</text>
  <text x="630" y="202" text-anchor="middle" font-size="11" fill="#374151">CPU/GPU 看同一份資料,免複製</text>
  <!-- connect lines -->
  <line x1="510" y1="146" x2="510" y2="158" stroke="#16A34A" stroke-width="2"/>
  <line x1="750" y1="146" x2="750" y2="158" stroke="#16A34A" stroke-width="2"/>

  <!-- capacity bar big -->
  <rect x="460" y="232" width="340" height="40" rx="5" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.2"/>
  <rect x="464" y="236" width="200" height="32" rx="3" fill="#22C55E"/>
  <text x="564" y="257" text-anchor="middle" font-size="10.5" fill="#fff" font-weight="700">128GB</text>
  <text x="730" y="257" text-anchor="middle" font-size="11.5" fill="#15803D">容量大</text>

  <!-- model fits -->
  <rect x="460" y="284" width="340" height="64" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.4"/>
  <text x="630" y="308" text-anchor="middle" font-size="12.5" font-weight="700" fill="#15803D">✓ 大模型塞得下(配 FP4 量化更省)</text>
  <text x="630" y="330" text-anchor="middle" font-size="11" fill="#374151">代價:273GB/s 頻寬不如 HBM → 跑得下但較慢</text>

  <text x="420" y="384" text-anchor="middle" font-size="12.5" font-weight="700" fill="#374151">一句話:用「大容量、共享、省電」換掉「極致頻寬」——本地跑大模型的取捨</text>
  <text x="420" y="404" text-anchor="middle" font-size="11" fill="#9CA3AF">容量決定「裝不裝得下」,頻寬決定「跑多快」;推論是頻寬 bound,兩者常此消彼長</text>
</svg>

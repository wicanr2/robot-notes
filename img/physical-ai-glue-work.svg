<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs><marker id="gw-a" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 Z" fill="#C7CCD1"/></marker></defs>
  <rect width="720" height="400" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">真正吃掉時間的不是算力,是這層「膠水 + 迭代」</text>

  <!-- 中心 -->
  <rect x="34" y="168" width="170" height="70" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="119" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">一套能訓練</text>
  <text x="119" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">的模擬</text>

  <!-- 連線 -->
  <g stroke="#C7CCD1" stroke-width="1.2" marker-end="url(#gw-a)">
    <line x1="204" y1="190" x2="296" y2="84"/><line x1="204" y1="195" x2="296" y2="132"/><line x1="204" y1="200" x2="296" y2="180"/><line x1="204" y1="205" x2="296" y2="228"/><line x1="204" y1="210" x2="296" y2="276"/><line x1="204" y1="215" x2="296" y2="324"/><line x1="204" y1="220" x2="296" y2="370"/>
  </g>

  <!-- 7 個產出物 -->
  <g font-size="11">
    <rect x="300" y="64" width="392" height="40" rx="6" fill="#FFF7ED" stroke="#F59E0B"/><text x="314" y="80" font-weight="700" fill="#9A3412">機器人模型</text><text x="314" y="96" font-size="9.5" fill="#6B7280">URDF / SDF / USD:關節、慣量、感測器掛載</text><text x="676" y="89" font-size="14" fill="#F97316">↻</text>
    <rect x="300" y="112" width="392" height="40" rx="6" fill="#FFF7ED" stroke="#F59E0B"/><text x="314" y="128" font-weight="700" fill="#9A3412">場景</text><text x="314" y="144" font-size="9.5" fill="#6B7280">world 檔、資產擺位、光照</text><text x="676" y="137" font-size="14" fill="#F97316">↻</text>
    <rect x="300" y="160" width="392" height="40" rx="6" fill="#FFF7ED" stroke="#F59E0B"/><text x="314" y="176" font-weight="700" fill="#9A3412">ROS2 整合</text><text x="314" y="192" font-size="9.5" fill="#6B7280">launch file、bridge 設定、base driver node</text><text x="676" y="185" font-size="14" fill="#F97316">↻</text>
    <rect x="300" y="208" width="392" height="40" rx="6" fill="#FFF7ED" stroke="#F59E0B"/><text x="314" y="224" font-weight="700" fill="#9A3412">RL 環境</text><text x="314" y="240" font-size="9.5" fill="#6B7280">observation / action / reward / termination</text><text x="676" y="233" font-size="14" fill="#F97316">↻</text>
    <rect x="300" y="256" width="392" height="40" rx="6" fill="#FFF7ED" stroke="#F59E0B"/><text x="314" y="272" font-weight="700" fill="#9A3412">域隨機化</text><text x="314" y="288" font-size="9.5" fill="#6B7280">隨機哪些參數、分布範圍多少</text><text x="676" y="281" font-size="14" fill="#F97316">↻</text>
    <rect x="300" y="304" width="392" height="40" rx="6" fill="#FFF7ED" stroke="#F59E0B"/><text x="314" y="320" font-weight="700" fill="#9A3412">分析</text><text x="314" y="336" font-size="9.5" fill="#6B7280">解析 log / rosbag、算 success rate、找失敗原因</text><text x="676" y="329" font-size="14" fill="#F97316">↻</text>
    <rect x="300" y="352" width="392" height="40" rx="6" fill="#FFF7ED" stroke="#F59E0B"/><text x="314" y="368" font-weight="700" fill="#9A3412">sim-to-real</text><text x="314" y="384" font-size="9.5" fill="#6B7280">校準參數、檢查清單、A/B 對比</text><text x="676" y="377" font-size="14" fill="#F97316">↻</text>
  </g>

  <text x="119" y="276" text-anchor="middle" font-size="10" fill="#6B7280">↻ = 每一項</text>
  <text x="119" y="292" text-anchor="middle" font-size="10" fill="#6B7280">都要改很多輪</text>
  <text x="119" y="330" text-anchor="middle" font-size="10.5" fill="#374151">全是結構化</text>
  <text x="119" y="346" text-anchor="middle" font-size="10.5" fill="#374151">設定檔 + 程式碼</text>
  <text x="119" y="372" text-anchor="middle" font-size="10" fill="#9A3412">→ Claude 把這層</text>
  <text x="119" y="387" text-anchor="middle" font-size="10" fill="#9A3412">成本壓到接近零</text>
</svg>
